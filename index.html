function ContractModal({ quote, onClose }) {
  const { subtotal, vat, total } = calcItems(quote.items, quote.vatRate);
  const today = new Date();

  const DEFAULT_FORM = {
    contractNumber: "",
    contractDate: { day: String(today.getDate()).padStart(2,"0"), month: String(today.getMonth()+1).padStart(2,"0"), year: String(today.getFullYear()) },
    buyerName: quote.customer || "",
    buyerNameEn: "",
    buyerRep: quote.contact || "",
    buyerRepEn: "",
    buyerPosition: "",
    buyerPositionEn: "",
    buyerAddress: quote.address || "",
    buyerAddressEn: "",
    buyerTel: quote.phone || "",
    buyerTaxCode: quote.taxId || "",
    buyerAccountNo: "",
    buyerBank: "",
    buyerBankEn: "",
    deliveryDays: "05",
    deliveryPlace: quote.address || "",
    deliveryPlaceEn: "",
    paymentTerm: `thanh toán 100% giá trị hợp đồng tương đương ${fmt(total)} VNĐ (${numberToWordsVN(total)}) sau khi bàn giao và lắp đặt thiết bị.`,
    paymentTermEn: "",
    paymentTermZh: "",
    art4_1_vi: "", art4_1_b: "",
    art4_2_vi: "", art4_2_b: "",
    art4_3_vi: "", art4_3_b: "",
    art4_4_vi: "", art4_4_b: "",
    art5_vi: "",   art5_b: "",
    art6_1_vi: "", art6_1_b: "",
    art6_2_vi: "", art6_2_b: "",
    art6_3_vi: "", art6_3_b: "",
    art6_4_vi: "", art6_4_b: "",
    art6_5_vi: "", art6_5_b: "",
  };

  const [lang, setLang] = useState("vi_en");
  const [form, setForm] = useState(DEFAULT_FORM);
  const [loaded, setLoaded] = useState(false);
  const [wordLoading, setWordLoading] = useState(false);
  const [pdfLoadingC, setPdfLoadingC] = useState(false);
  const [saveMsg, setSaveMsg] = useState("");
  const [translating, setTranslating] = useState(false);

  // ── MỚI: Cỡ chữ và lề trang ──────────────────────────────────────
  const [fontSize, setFontSize] = useState(12);          // đơn vị pt
  const [pageMargins, setPageMargins] = useState({ top: 20, right: 20, bottom: 20, left: 30 }); // mm
  // ─────────────────────────────────────────────────────────────────

  useEffect(() => {
    loadContract(quote.id).then(saved => {
      if (saved) {
        const { quoteId, ...rest } = saved;
        setForm(prev => ({ ...DEFAULT_FORM, ...rest,
          buyerName: rest.buyerName || quote.customer || "",
          buyerRep:  rest.buyerRep  || quote.contact  || "",
          buyerAddress: rest.buyerAddress || quote.address || "",
          buyerTel:  rest.buyerTel  || quote.phone   || "",
          buyerTaxCode: rest.buyerTaxCode || quote.taxId || "",
        }));
        if (rest.lang) setLang(rest.lang);
        if (rest.fontSize) setFontSize(rest.fontSize);
        if (rest.pageMargins) setPageMargins(rest.pageMargins);
      }
      setLoaded(true);
    }).catch(() => setLoaded(true));
  }, [quote.id]);

  const setField = (f, v) => setForm(p => ({...p, [f]: v}));
  const T = lang === "vi_en" ? CONTRACT_TEXT.vi_en : CONTRACT_TEXT_VI_ZH;

  const clause = (viKey, tDefault) => form[viKey] || tDefault;
  const clauseB = (bKey, tDefault) => form[bKey] || tDefault;

  const paymentB = lang === "vi_en"
    ? (form.paymentTermEn || `Pay 100% of the contract value equivalent to ${fmt(total)} VND (${numberToWordsEN(total)}) after handover and installation of the equipment.`)
    : (form.paymentTermZh || `合同总价值的100%，相当于 ${fmt(total)} 越南盾（${numberToWordsCN(total)}），在设备交接安装完成后支付。`);

  const handleSave = async () => {
    await saveContract(quote.id, { ...form, lang, fontSize, pageMargins });
    setSaveMsg("✓ Đã lưu");
    setTimeout(() => setSaveMsg(""), 2000);
  };

  const handleAutoTranslate = async () => {
    setTranslating(true);
    const targetLang = lang === "vi_en" ? "English" : "Simplified Chinese (简体中文)";
    const fieldsToTranslate = {
      buyerNameEn:      form.buyerName,
      buyerRepEn:       form.buyerRep,
      buyerPositionEn:  form.buyerPosition,
      buyerAddressEn:   form.buyerAddress,
      buyerBankEn:      form.buyerBank,
      deliveryPlaceEn:  form.deliveryPlace,
      [lang==="vi_en"?"paymentTermEn":"paymentTermZh"]: form.paymentTerm,
    };
    const viText = Object.entries(fieldsToTranslate)
      .filter(([,v]) => v && v.trim())
      .map(([k,v]) => `[${k}]: ${v}`)
      .join("\n");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          system: `You are a professional Vietnamese-to-${targetLang} translator for legal/commercial documents. Translate ONLY the values, keep the [key] labels exactly. Return ONLY JSON object mapping keys to translated strings, no markdown.`,
          messages: [{ role: "user", content: `Translate these Vietnamese values to ${targetLang}:\n${viText}` }],
        }),
      });
      const data = await res.json();
      const text = (data.content || []).map(c => c.text||"").join("");
      const clean = text.replace(/```json|```/g,"").trim();
      const translated = JSON.parse(clean);
      setForm(p => ({ ...p, ...translated }));
    } catch(e) {
      alert("Lỗi dịch tự động: " + e.message);
    } finally {
      setTranslating(false);
    }
  };

  const itemRowsHtml = quote.items.map((it,i) => {
    const line = (it.qty||0)*(it.price||0);
    return (
      <tr key={it.id}>
        <td style={{textAlign:"center"}}>{i+1}</td>
        <td>{it.name}{it.note ? <div style={{fontSize:`${fontSize*0.85}pt`,color:"#888",fontStyle:"italic"}}>{it.note}</div> : null}</td>
        <td style={{textAlign:"center"}}>{it.qty}</td>
        <td style={{textAlign:"center"}}>{it.unit}</td>
        <td className="right">{fmt(it.price)}</td>
        <td className="right">{fmt(line)}</td>
      </tr>
    );
  });

  // ── DOCX export ──────────────────────────────────────────────────
  const handleWord = async () => {
    const colW = [400, 3700, 700, 700, 1400, 1500];
    const totalW = colW.reduce((a,b)=>a+b,0);

    // Font sizes in half-points (DOCX unit = pt × 2)
    const SZ     = Math.round(fontSize * 2);       // body
    const SZ_SM  = Math.round(fontSize * 1.8);     // small/italic translation
    const SZ_H1  = Math.round(fontSize * 2.8);     // title
    const SZ_H2  = Math.round(fontSize * 2.4);     // article heading
    const SZ_LG  = Math.round(fontSize * 2.2);     // slightly larger
    const SZ_XSM = Math.round(fontSize * 1.6);     // footnote

    // mm → twips (1 mm ≈ 56.7 twips)
    const mmToTwips = mm => Math.round(mm * 56.7);

    const partyBlock = (titleVi, titleEn, name, nameEn, rep, repEn, pos, posEn, addr, addrEn, tel, taxCode, accNo, bankName, bankNameEn) => {
      const rows = [];
      rows.push(dxBi(`${titleVi}: ${name}`, `${titleEn}: ${nameEn||name}`, {bold:true, gap:40, size:SZ}));
      if (rep)      rows.push(dxBi(`${T.rep}: ${rep}`, `${T.repB}: ${repEn||rep}`, {gap:20, size:SZ}));
      if (pos)      rows.push(dxBi(`${T.position}: ${pos}`, `${T.positionB}: ${posEn||pos}`, {gap:20, size:SZ}));
      if (addr)     rows.push(dxBi(`${T.address}: ${addr}`, `${T.addressB}: ${addrEn||addr}`, {gap:20, size:SZ}));
      if (tel)      rows.push(dxBi(`${T.tel}: ${tel}`, `${T.telB}: ${tel}`, {gap:20, size:SZ}));
      if (taxCode)  rows.push(dxBi(`${T.taxCode}: ${taxCode}`, `${T.taxCodeB}: ${taxCode}`, {gap:20, size:SZ}));
      if (accNo)    rows.push(dxBi(`${T.accountNo}: ${accNo}`, `${T.accountNoB}: ${accNo}`, {gap:20, size:SZ}));
      if (bankName) rows.push(dxBi(`${T.atBank}: ${bankName}`, `${T.atBankB}: ${bankNameEn||bankName}`, {gap:80, size:SZ}));
      return rows.join("");
    };

    const dxHeading = (vi, other) => [
      dxPara([{text: vi, bold:true}], {size:SZ_H2, spaceBefore:160, spaceAfter:0}),
      dxPara([{text: other, italic:true, color:"555555"}], {size:SZ_LG, spaceBefore:0, spaceAfter:80}),
    ].join("");

    const headerRow = dxRow(T.itemsHeader.map((h,i) => dxHeaderCell(h, T.itemsHeaderB[i], colW[i])), {header:true});
    const itemRows = quote.items.map((it, i) => {
      const line = (it.qty||0)*(it.price||0);
      const nameParas = [dxPara(it.name, {size:SZ})];
      if (it.note) nameParas.push(dxPara([{text:it.note, italic:true, color:"888888"}], {size:SZ_XSM}));
      return dxRow([
        dxCell(dxPara(String(i+1), {align:"center", size:SZ}), colW[0]),
        dxCell(nameParas, colW[1]),
        dxCell(dxPara(String(it.qty), {align:"center", size:SZ}), colW[2]),
        dxCell(dxPara(it.unit, {align:"center", size:SZ}), colW[3]),
        dxCell(dxPara(fmt(it.price), {align:"right", size:SZ}), colW[4]),
        dxCell(dxPara(fmt(line), {align:"right", size:SZ}), colW[5]),
      ]);
    });

    const sumRow = (vi, other, val) => dxRow([
      dxCell([
        dxPara(vi, {align:"right", bold:true, size:SZ, spaceAfter:0}),
        dxPara(other, {align:"right", italic:true, color:"555555", size:SZ_SM}),
      ], colW.slice(0,5).reduce((a,b)=>a+b,0), {span:5}),
      dxCell(dxPara(fmt(val)+" đ", {align:"right", bold:true, size:SZ}), colW[5]),
    ]);

    const itemsTable = dxTable([headerRow, ...itemRows,
      sumRow(T.rowTotal, T.rowTotalB, subtotal),
      sumRow(T.rowVat(vatLabel(quote.vatRate)), T.rowVatB(vatLabel(quote.vatRate)), vat),
      sumRow(T.rowGrand, T.rowGrandB, total),
    ], totalW);

    const signRow = dxRow([
      dxNoBorderCell([
        dxPara(T.signSeller, {align:"center", bold:true, spaceAfter:0, size:SZ}),
        dxPara(T.signSellerB, {align:"center", italic:true, color:"555555", size:SZ_SM, spaceAfter:240}),
        "<w:p/>","<w:p/>","<w:p/>",
        dxPara("(Ký, ghi rõ họ tên)", {align:"center", italic:true, size:SZ_SM, spaceAfter:0}),
        dxPara(COMPANY.representative, {align:"center", bold:true, size:SZ}),
      ], 4500),
      dxNoBorderCell([
        dxPara(T.signBuyer, {align:"center", bold:true, spaceAfter:0, size:SZ}),
        dxPara(T.signBuyerB, {align:"center", italic:true, color:"555555", size:SZ_SM, spaceAfter:240}),
        "<w:p/>","<w:p/>","<w:p/>",
        dxPara("(Ký, ghi rõ họ tên)", {align:"center", italic:true, size:SZ_SM, spaceAfter:0}),
        dxPara(form.buyerRep||"", {align:"center", bold:true, size:SZ}),
      ], 4500),
    ]);

    const body = [
      dxBi(T.natTitle1, T.natTitle1b, {bold:true, align:"center", size:SZ_LG, gap:20}),
      dxBi(T.natTitle2, T.natTitle2b, {bold:true, align:"center", size:SZ, gap:200}),
      dxBi(T.title, T.titleB, {bold:true, align:"center", size:SZ_H1, gap:60}),
      dxPara(`Số/No: ${form.contractNumber||"......"}`, {align:"center", size:SZ_SM, color:"888888", spaceAfter:160}),
      dxBi(T.legalBasis, T.legalBasisB, {gap:120, size:SZ}),
      dxBi(T.today(form.contractDate), T.todayB(form.contractDate), {gap:160, size:SZ}),

      partyBlock(T.seller, T.sellerB, COMPANY.name, COMPANY.nameEn, COMPANY.representative, COMPANY.representativeEn, COMPANY.position, COMPANY.positionEn, COMPANY.address, COMPANY.addressEn, COMPANY.phone, COMPANY.mst, COMPANY.bankAccount, COMPANY.bankName, COMPANY.bankNameEn),
      "<w:p/>",
      partyBlock(T.buyer, T.buyerB, form.buyerName, form.buyerNameEn||form.buyerName, form.buyerRep, form.buyerRepEn, form.buyerPosition, form.buyerPositionEn, form.buyerAddress, form.buyerAddressEn, form.buyerTel, form.buyerTaxCode, form.buyerAccountNo, form.buyerBank, form.buyerBankEn),
      "<w:p/>",
      dxBi(T.agree, T.agreeB, {gap:160, size:SZ}),

      dxHeading(T.art1, T.art1B),
      dxBi(`1.1 ${T.art1_1}`, T.art1_1B, {gap:40, size:SZ}),
      dxBi(T.art1_desc, T.art1_descB, {gap:80, size:SZ}),
      itemsTable,
      dxPara(T.inWords(numberToWordsVN(total)), {align:"right", bold:true, size:SZ_LG, spaceAfter:0}),
      dxPara(T.inWordsB(lang==="vi_en"?numberToWordsEN(total):numberToWordsCN(total)), {align:"right", italic:true, color:"555555", size:SZ, spaceAfter:120}),
      dxBi(`1.2 ${T.art1_2}: ${T.quality}`, `${T.art1_2B}: ${T.qualityB}`, {gap:40, size:SZ}),
      dxBi(T.art1_3, T.art1_3B, {gap:40, size:SZ}),
      ...T.docs.map((d,i) => dxBi(`- ${d}`, `- ${T.docsB[i]}`, {gap:20, size:SZ})),
      "<w:p/>",

      dxHeading(T.art2, T.art2B),
      dxBi(`${T.art2_lead}: ${form.paymentTerm}`, `${T.art2_leadB}: ${paymentB}`, {gap:160, size:SZ}),

      dxHeading(T.art3, T.art3B),
      dxBi(T.art3_1(form.deliveryDays), T.art3_1B(form.deliveryDays), {gap:40, size:SZ}),
      dxBi(T.art3_2(form.deliveryPlace), T.art3_2B(form.deliveryPlaceEn||form.deliveryPlace), {gap:160, size:SZ}),

      dxHeading(T.art4, T.art4B),
      dxBi(clause("art4_1_vi",T.art4_1), clauseB("art4_1_b",T.art4_1B), {gap:40, size:SZ}),
      dxBi(clause("art4_2_vi",T.art4_2), clauseB("art4_2_b",T.art4_2B), {gap:40, size:SZ}),
      dxBi(clause("art4_3_vi",T.art4_3), clauseB("art4_3_b",T.art4_3B), {gap:40, size:SZ}),
      dxBi(clause("art4_4_vi",T.art4_4), clauseB("art4_4_b",T.art4_4B), {gap:160, size:SZ}),

      dxHeading(T.art5, T.art5B),
      dxBi(clause("art5_vi",T.art5_body), clauseB("art5_b",T.art5_bodyB), {gap:160, size:SZ}),

      dxHeading(T.art6, T.art6B),
      dxBi(`6.1 ${clause("art6_1_vi",T.art6_1)}`, `6.1 ${clauseB("art6_1_b",T.art6_1B)}`, {gap:40, size:SZ}),
      dxBi(`6.2 ${clause("art6_2_vi",T.art6_2)}`, `6.2 ${clauseB("art6_2_b",T.art6_2B)}`, {gap:40, size:SZ}),
      dxBi(`6.3 ${clause("art6_3_vi",T.art6_3)}`, `6.3 ${clauseB("art6_3_b",T.art6_3B)}`, {gap:40, size:SZ}),
      dxBi(`6.4 ${clause("art6_4_vi",T.art6_4)}`, `6.4 ${clauseB("art6_4_b",T.art6_4B)}`, {gap:40, size:SZ}),
      dxBi(`6.5 ${clause("art6_5_vi",T.art6_5)}`, `6.5 ${clauseB("art6_5_b",T.art6_5B)}`, {gap:240, size:SZ}),

      dxNoBorderTable([signRow], 9000),
    ];

    const blob = await buildDocxBlob(body, {}, {
      top:    mmToTwips(pageMargins.top),
      bottom: mmToTwips(pageMargins.bottom),
      left:   mmToTwips(pageMargins.left),
      right:  mmToTwips(pageMargins.right),
      header: 0,
      footer: 0,
    });
    downloadBlob(blob, "HopDong_" + (form.contractNumber || quote.quoteNumber) + ".docx");
  };

  const handleWordClick = async () => {
    setWordLoading(true);
    try {
      await saveContract(quote.id, { ...form, lang, fontSize, pageMargins });
      await handleWord();
    } catch(e) { alert("Lỗi xuất Word: " + e.message); } finally { setWordLoading(false); }
  };


 

const handlePDFClick = async () => {
  setPdfLoadingC(true);
  try {

    // ══════════════════════════════════════════════════════════════════
    // NHÁNH vi_zh: render HTML tạm → html2canvas → PDF (hỗ trợ CJK)
    // ══════════════════════════════════════════════════════════════════
    if (lang === "vi_zh") {
      const FS       = fontSize || 12;
      const FS_SM    = Math.round(FS * 0.88 * 10) / 10;
      const FS_LG    = Math.round(FS * 1.1  * 10) / 10;
      const FS_TITLE = Math.round(FS * 1.55 * 10) / 10;
      const COL_NAVY = "#1A2540";
      const COL_GRAY = "#555555";
      const COL_LIGHT= "#888888";

      const paymentB = form.paymentTermZh ||
        `合同总价值的100%，相当于 ${fmt(total)} 越南盾（${numberToWordsCN(total)}），在设备交接安装完成后支付。`;

      const biRow = (vi, zh) =>
        `<p style="margin:0 0 1px;font-size:${FS}pt;color:#000">${vi}</p>
         <p style="margin:0 0 4px;font-size:${FS_SM}pt;color:${COL_GRAY};font-style:italic">${zh}</p>`;

      const artHead = (vi, zh) =>
        `<p style="margin:10px 0 1px;font-size:${FS_LG}pt;font-weight:700;color:${COL_NAVY};text-transform:uppercase">${vi}</p>
         <p style="margin:0 0 5px;font-size:${FS_SM}pt;color:${COL_GRAY};font-style:italic">${zh}</p>`;

      const partyHtml = (titleVi, titleZh, name, nameZh, rep, repZh, pos, posZh, addr, addrZh, tel, taxCode, accNo, bankVi, bankZh) => {
        let h = biRow(`<b>${titleVi}: ${name}</b>`, `<b>${titleZh}: ${nameZh||name}</b>`);
        if (rep)     h += biRow(`${T.rep}: ${rep}`,        `${T.repB}: ${repZh||rep}`);
        if (pos)     h += biRow(`${T.position}: ${pos}`,    `${T.positionB}: ${posZh||pos}`);
        if (addr)    h += biRow(`${T.address}: ${addr}`,    `${T.addressB}: ${addrZh||addr}`);
        if (tel)     h += biRow(`${T.tel}: ${tel}`,          `${T.telB}: ${tel}`);
        if (taxCode) h += biRow(`${T.taxCode}: ${taxCode}`,  `${T.taxCodeB}: ${taxCode}`);
        if (accNo)   h += biRow(`${T.accountNo}: ${accNo}`,  `${T.accountNoB}: ${accNo}`);
        if (bankVi)  h += biRow(`${T.atBank}: ${bankVi}`,    `${T.atBankB}: ${bankZh||bankVi}`);
        return h;
      };

      const tdS = (align, extra) =>
        `style="padding:4px 5px;border:0.5px solid #aaa;font-size:${FS_SM}pt;text-align:${align};vertical-align:top;${extra||''}"`;

      let itemRowsHtml = "";
      quote.items.forEach((it, i) => {
        const line = (it.qty||0)*(it.price||0);
        itemRowsHtml += `<tr>
          <td ${tdS("center")}>${i+1}</td>
          <td ${tdS("left")}>${it.name}${it.note?`<div style="font-size:${FS_SM*0.85}pt;color:${COL_LIGHT};font-style:italic">${it.note}</div>`:""}</td>
          <td ${tdS("center")}>${it.qty}</td>
          <td ${tdS("center")}>${it.unit}</td>
          <td ${tdS("right")}>${fmt(it.price)}</td>
          <td ${tdS("right","font-weight:700")}>${fmt(line)}</td>
        </tr>`;
      });

      const sumRow = (vi, zh, val, bold) => `<tr>
        <td colspan="5" ${tdS("right", bold?"font-weight:700":"")}>
          <span style="font-size:${FS_SM}pt">${vi}</span><br>
          <span style="font-size:${FS_SM*0.85}pt;color:${COL_GRAY};font-style:italic">${zh}</span>
        </td>
        <td ${tdS("right", bold?`font-weight:700;color:${COL_NAVY};font-size:${FS_SM*1.05}pt`:"")}>${fmt(val)}</td>
      </tr>`;

      const thS = `style="padding:4px 5px;border:0.5px solid #aaa;font-size:${FS_SM}pt;font-weight:700;background:#f0f0f0;text-align:center"`;
      const tableHtml = `
        <table style="width:100%;border-collapse:collapse;margin:4px 0">
          <thead><tr>
            ${T.itemsHeader.map((h,i)=>`<th ${thS}>${h}<br><span style="font-size:${FS_SM*0.82}pt;color:${COL_LIGHT};font-weight:normal;font-style:italic">${T.itemsHeaderB[i]}</span></th>`).join("")}
          </tr></thead>
          <tbody>
            ${itemRowsHtml}
            ${sumRow(T.rowTotal,T.rowTotalB,subtotal,false)}
            ${sumRow(T.rowVat(vatLabel(quote.vatRate)),T.rowVatB(vatLabel(quote.vatRate)),vat,false)}
            ${sumRow(T.rowGrand,T.rowGrandB,total,true)}
          </tbody>
        </table>`;

      const signHtml = `
        <table style="width:100%;border-collapse:collapse;margin-top:24px">
          <tr>
            <td style="width:50%;text-align:center;padding:0 20px;border:none;vertical-align:top">
              <p style="margin:0;font-size:${FS_SM}pt;font-weight:700">${T.signSeller}</p>
              <p style="margin:0 0 8px;font-size:${FS_SM*0.85}pt;color:${COL_GRAY};font-style:italic">${T.signSellerB}</p>
              <p style="margin:0;font-size:${FS_SM*0.85}pt;font-style:italic;color:${COL_GRAY}">(Ký, ghi rõ họ tên)</p>
              <div style="height:64px"></div>
              <p style="margin:0;font-size:${FS_SM}pt;font-weight:700">${COMPANY.representative||""}</p>
            </td>
            <td style="width:50%;text-align:center;padding:0 20px;border:none;vertical-align:top">
              <p style="margin:0;font-size:${FS_SM}pt;font-weight:700">${T.signBuyer}</p>
              <p style="margin:0 0 8px;font-size:${FS_SM*0.85}pt;color:${COL_GRAY};font-style:italic">${T.signBuyerB}</p>
              <p style="margin:0;font-size:${FS_SM*0.85}pt;font-style:italic;color:${COL_GRAY}">(Ký, ghi rõ họ tên)</p>
              <div style="height:64px"></div>
              <p style="margin:0;font-size:${FS_SM}pt;font-weight:700">${form.buyerRep||""}</p>
            </td>
          </tr>
        </table>`;

      const ML = pageMargins.left   || 30;
      const MR = pageMargins.right  || 20;
      const MT = pageMargins.top    || 20;
      const MB = pageMargins.bottom || 20;

      const fullHtml = `
        <div style="font-family:'Plus Jakarta Sans','Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;font-size:${FS}pt;line-height:1.55;color:#000;background:#fff;padding:${MT}mm ${MR}mm ${MB}mm ${ML}mm;box-sizing:border-box;width:794px">
          <p style="text-align:center;margin:0;font-size:${FS*1.05}pt;font-weight:700">${T.natTitle1}</p>
          <p style="text-align:center;margin:0 0 1px;font-size:${FS_SM}pt;color:${COL_GRAY};font-style:italic">${T.natTitle1b}</p>
          <p style="text-align:center;margin:0;font-size:${FS}pt;font-weight:700">${T.natTitle2}</p>
          <p style="text-align:center;margin:0 0 14px;font-size:${FS_SM}pt;color:${COL_GRAY};font-style:italic">${T.natTitle2b}</p>
          <p style="text-align:center;margin:0;font-size:${FS_TITLE}pt;font-weight:700;color:${COL_NAVY};text-transform:uppercase">${T.title}</p>
          <p style="text-align:center;margin:0 0 2px;font-size:${FS_LG}pt;color:${COL_GRAY};font-style:italic">${T.titleB}</p>
          <p style="text-align:center;margin:0 0 14px;font-size:${FS_SM}pt;color:${COL_LIGHT}">Số/No: ${form.contractNumber||"......"}</p>
          ${biRow(T.legalBasis, T.legalBasisB)}
          ${biRow(T.today(form.contractDate), T.todayB(form.contractDate))}
          <div style="margin-bottom:10px"></div>
          ${partyHtml(T.seller,T.sellerB,COMPANY.name,COMPANY.nameEn,COMPANY.representative,COMPANY.representativeEn,COMPANY.position,COMPANY.positionEn,COMPANY.address,COMPANY.addressEn,COMPANY.phone,COMPANY.mst,COMPANY.bankAccount,COMPANY.bankName,COMPANY.bankNameEn)}
          <div style="margin-bottom:8px"></div>
          ${partyHtml(T.buyer,T.buyerB,form.buyerName,form.buyerNameEn||form.buyerName,form.buyerRep,form.buyerRepEn,form.buyerPosition,form.buyerPositionEn,form.buyerAddress,form.buyerAddressEn,form.buyerTel,form.buyerTaxCode,form.buyerAccountNo,form.buyerBank,form.buyerBankEn)}
          <div style="margin-bottom:8px"></div>
          ${biRow(T.agree, T.agreeB)}
          <div style="margin-bottom:12px"></div>
          ${artHead(T.art1, T.art1B)}
          ${biRow(`<b>1.1 ${T.art1_1}</b>`, T.art1_1B)}
          ${biRow(T.art1_desc, T.art1_descB)}
          ${tableHtml}
          <p style="text-align:right;margin:2px 0 1px;font-size:${FS_SM}pt;font-weight:700">${T.inWords(numberToWordsVN(total))}</p>
          <p style="text-align:right;margin:0 0 8px;font-size:${FS_SM*0.9}pt;color:${COL_GRAY};font-style:italic">${T.inWordsB(numberToWordsCN(total))}</p>
          ${biRow(`1.2 ${T.art1_2}: ${T.quality}`, `${T.art1_2B}: ${T.qualityB}`)}
          ${biRow(T.art1_3, T.art1_3B)}
          ${T.docs.map((d,i)=>biRow(`&nbsp;&nbsp;- ${d}`,`&nbsp;&nbsp;- ${T.docsB[i]}`)).join("")}
          ${artHead(T.art2, T.art2B)}
          ${biRow(`${T.art2_lead}: ${form.paymentTerm}`, `${T.art2_leadB}: ${paymentB}`)}
          <div style="margin-bottom:10px"></div>
          ${artHead(T.art3, T.art3B)}
          ${biRow(T.art3_1(form.deliveryDays), T.art3_1B(form.deliveryDays))}
          ${biRow(T.art3_2(form.deliveryPlace), T.art3_2B(form.deliveryPlaceEn||form.deliveryPlace))}
          <div style="margin-bottom:10px"></div>
          ${artHead(T.art4, T.art4B)}
          ${biRow(clause("art4_1_vi",T.art4_1), clauseB("art4_1_b",T.art4_1B))}
          ${biRow(clause("art4_2_vi",T.art4_2), clauseB("art4_2_b",T.art4_2B))}
          ${biRow(clause("art4_3_vi",T.art4_3), clauseB("art4_3_b",T.art4_3B))}
          ${biRow(clause("art4_4_vi",T.art4_4), clauseB("art4_4_b",T.art4_4B))}
          <div style="margin-bottom:10px"></div>
          ${artHead(T.art5, T.art5B)}
          ${biRow(clause("art5_vi",T.art5_body), clauseB("art5_b",T.art5_bodyB))}
          <div style="margin-bottom:10px"></div>
          ${artHead(T.art6, T.art6B)}
          ${biRow(`6.1 ${clause("art6_1_vi",T.art6_1)}`,`6.1 ${clauseB("art6_1_b",T.art6_1B)}`)}
          ${biRow(`6.2 ${clause("art6_2_vi",T.art6_2)}`,`6.2 ${clauseB("art6_2_b",T.art6_2B)}`)}
          ${biRow(`6.3 ${clause("art6_3_vi",T.art6_3)}`,`6.3 ${clauseB("art6_3_b",T.art6_3B)}`)}
          ${biRow(`6.4 ${clause("art6_4_vi",T.art6_4)}`,`6.4 ${clauseB("art6_4_b",T.art6_4B)}`)}
          ${biRow(`6.5 ${clause("art6_5_vi",T.art6_5)}`,`6.5 ${clauseB("art6_5_b",T.art6_5B)}`)}
          <div style="margin-bottom:16px"></div>
          ${signHtml}
        </div>`;

      const wrapper = document.createElement("div");
      wrapper.style.cssText = "position:fixed;top:-99999px;left:-99999px;width:794px;background:#fff;";
      wrapper.innerHTML = fullHtml;
      document.body.appendChild(wrapper);

      const noCutRanges = [];
      wrapper.querySelectorAll("p, h1, h2, h3, h4, h5, h6, table, tr, ul, ol, blockquote, section, header, footer").forEach(elm => {
        const r = elm.getBoundingClientRect();
        const p = wrapper.getBoundingClientRect();
        noCutRanges.push({ top: r.top - p.top, bottom: r.bottom - p.top });
      });

      const SCALE = 3;
      const canvas = await window.html2canvas(wrapper, {
        scale: SCALE, useCORS: true, allowTaint: true,
        backgroundColor: "#ffffff", logging: false,
        width: 794, height: wrapper.scrollHeight,
        windowWidth: 794, imageTimeout: 0,
      });
      document.body.removeChild(wrapper);

      const { jsPDF } = window.jspdf;
      const MARGIN = 10;
      const printW = 210 - MARGIN * 2, printH = 297 - MARGIN * 2;
      const realW = canvas.width / SCALE, realH = canvas.height / SCALE;
      const mmPerPx = printW / realW, pxPerPage = printH / mmPerPx;
      const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
      let srcY = 0, page = 0;

      while (srcY < realH) {
        if (page > 0) doc.addPage();
        let slicePx = Math.min(pxPerPage, realH - srcY);
        if (srcY + slicePx < realH) {
          for (const rng of noCutRanges) {
            if ((srcY + slicePx) > rng.top + 0.5 && (srcY + slicePx) < rng.bottom - 0.5) {
              const adj = rng.top - srcY;
              if (adj > 0) slicePx = adj;
              break;
            }
          }
        }
        const sliceMm = slicePx * mmPerPx;
        const slice = document.createElement("canvas");
        slice.width = canvas.width;
        slice.height = Math.ceil(slicePx * SCALE);
        const ctx = slice.getContext("2d");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, slice.width, slice.height);
        ctx.drawImage(canvas, 0, Math.floor(srcY*SCALE), canvas.width, Math.ceil(slicePx*SCALE), 0, 0, slice.width, slice.height);
        doc.addImage(slice.toDataURL("image/jpeg", 0.92), "JPEG", MARGIN, MARGIN, printW, sliceMm);
        srcY += slicePx;
        page++;
      }

      doc.save("HopDong_" + (form.contractNumber || quote.quoteNumber) + ".pdf");
      return; // ← kết thúc nhánh vi_zh, không chạy tiếp vào pdfMake
    }

    // ══════════════════════════════════════════════════════════════════
    // NHÁNH vi_en: giữ nguyên pdfMake
    // ══════════════════════════════════════════════════════════════════
    if (!window.pdfMake) {
      alert("pdfmake chua load. Kiem tra ket noi internet va thu lai.");
      return;
    }

    const FS       = fontSize || 12;
    const FS_SM    = Math.round(FS * 0.88 * 10) / 10;
    const FS_LG    = Math.round(FS * 1.1  * 10) / 10;
    const FS_TITLE = Math.round(FS * 1.55 * 10) / 10;
    const FS_NAT   = Math.round(FS * 1.05 * 10) / 10;

    const mmToPt = mm => Math.round(mm * 2.8346 * 10) / 10;
    const ML = mmToPt(pageMargins.left   || 30);
    const MR = mmToPt(pageMargins.right  || 20);
    const MT = mmToPt(pageMargins.top    || 20);
    const MB = mmToPt(pageMargins.bottom || 20);

    const COL_NAVY  = "#1A2540";
    const COL_GRAY  = "#555555";
    const COL_LIGHT = "#888888";

    const bi = (vi, other, opts) => {
      const o = opts || {};
      return [
        { text: vi, fontSize: o.size || FS, bold: o.bold || false, color: o.color || "#000000", alignment: o.align || "left", margin: [0, o.spaceBefore || 0, 0, 1] },
        { text: other, fontSize: o.sizeB || FS_SM, italics: true, color: COL_GRAY, alignment: o.align || "left", margin: [0, 0, 0, o.spaceAfter || 4] },
      ];
    };

    const artHeading = (vi, other) => [
      { text: vi,    fontSize: FS_LG, bold: true, color: COL_NAVY, margin: [0, 10, 0, 1] },
      { text: other, fontSize: FS_SM, italics: true, color: COL_GRAY, margin: [0, 0, 0, 5] },
    ];

    const partyBlock = (titleVi, titleEn, name, nameEn, rep, repEn, pos, posEn, addr, addrEn, tel, taxCode, accNo, bankVi, bankEn) => {
      const rows = [];
      rows.push(...bi(titleVi + ": " + name, titleEn + ": " + (nameEn || name), { bold: true, spaceAfter: 1 }));
      if (rep)     rows.push(...bi(T.rep      + ": " + rep,     T.repB      + ": " + (repEn  || rep),     { spaceAfter: 1 }));
      if (pos)     rows.push(...bi(T.position + ": " + pos,     T.positionB + ": " + (posEn  || pos),     { spaceAfter: 1 }));
      if (addr)    rows.push(...bi(T.address  + ": " + addr,    T.addressB  + ": " + (addrEn || addr),    { spaceAfter: 1 }));
      if (tel)     rows.push(...bi(T.tel      + ": " + tel,     T.telB      + ": " + tel,                 { spaceAfter: 1 }));
      if (taxCode) rows.push(...bi(T.taxCode  + ": " + taxCode, T.taxCodeB  + ": " + taxCode,             { spaceAfter: 1 }));
      if (accNo)   rows.push(...bi(T.accountNo+ ": " + accNo,   T.accountNoB+ ": " + accNo,               { spaceAfter: 1 }));
      if (bankVi)  rows.push(...bi(T.atBank   + ": " + bankVi,  T.atBankB   + ": " + (bankEn || bankVi),  { spaceAfter: 8 }));
      return rows;
    };

    const tableHeader = T.itemsHeader.map((h, i) => ({
      stack: [
        { text: h,                 fontSize: FS_SM, bold: true,   color: "#000000" },
        { text: T.itemsHeaderB[i], fontSize: FS_SM * 0.82, italics: true, color: COL_LIGHT },
      ],
      alignment: i === 1 ? "left" : "center",
      margin: [2, 3, 2, 3],
      fillColor: "#F0F0F0",
    }));

    const tableBody = [tableHeader];
    quote.items.forEach((it, i) => {
      const line = (it.qty || 0) * (it.price || 0);
      tableBody.push([
        { text: String(i + 1), alignment: "center", fontSize: FS_SM, margin: [2, 3, 2, 3] },
        { stack: [{ text: it.name, fontSize: FS_SM }, ...(it.note ? [{ text: it.note, fontSize: FS_SM * 0.85, italics: true, color: COL_LIGHT }] : [])], margin: [2, 3, 2, 3] },
        { text: String(it.qty), alignment: "center", fontSize: FS_SM, margin: [2, 3, 2, 3] },
        { text: it.unit,        alignment: "center", fontSize: FS_SM, margin: [2, 3, 2, 3] },
        { text: fmt(it.price),  alignment: "right",  fontSize: FS_SM, margin: [2, 3, 2, 3] },
        { text: fmt(line),      alignment: "right",  fontSize: FS_SM, bold: true, margin: [2, 3, 2, 3] },
      ]);
    });

    const sumRow = (labelVi, labelEn, val, isBold) => [
      { colSpan: 5, stack: [{ text: labelVi, alignment: "right", bold: isBold||false, fontSize: FS_SM }, { text: labelEn, alignment: "right", italics: true, color: COL_GRAY, fontSize: FS_SM * 0.85 }], border: [true,true,true,true], margin: [2,3,4,3] },
      {}, {}, {}, {},
      { text: fmt(val), alignment: "right", bold: isBold||false, fontSize: isBold ? FS_SM*1.05 : FS_SM, color: isBold ? COL_NAVY : "#000000", margin: [2,3,2,3] },

    tableBody.push(sumRow(T.rowTotal,  T.rowTotalB,  subtotal, false));
    tableBody.push(sumRow(T.rowVat(vatLabel(quote.vatRate)), T.rowVatB(vatLabel(quote.vatRate)), vat, false));
    tableBody.push(sumRow(T.rowGrand,  T.rowGrandB,  total,    true));

    const itemsTable = {
      table: { headerRows: 1, widths: [28, "*", 45, 38, 68, 76], body: tableBody },

    const signTable = {
      table: { widths: ["*", "*"], body: [[

        { stack: [{ text: T.signBuyer,  bold: true, fontSize: FS_SM, alignment: "center" }, { text: T.signBuyerB,  italics: true, fontSize: FS_SM*0.85, color: COL_GRAY, alignment: "center" }, { text: "\n\n\n\n", fontSize: FS_SM }, { text: "(Ký, ghi rõ họ tên)", italics: true, fontSize: FS_SM*0.85, alignment: "center" }, { text: form.buyerRep||"", bold: true, fontSize: FS_SM, alignment: "center" }], border: [false,false,false,false] },
      ]]},
      margin: [0, 24, 0, 0],
    };

    const paymentB_en = form.paymentTermEn ||
      `Pay 100% of the contract value equivalent to ${fmt(total)} VND (${numberToWordsEN(total)}) after handover and installation of the equipment.`;

    const docDefinition = {
      pageSize: "A4",
      pageMargins: [ML, MT, MR, MB],
      defaultStyle: { font: "Roboto", fontSize: FS, lineHeight: 1.45 },
      content: [
        ...bi(T.natTitle1, T.natTitle1b, { bold:true, align:"center", size:FS_NAT, spaceAfter:1 }),
        ...bi(T.natTitle2, T.natTitle2b, { bold:true, align:"center", size:FS_SM,  spaceAfter:14 }),
        { text: T.title,  bold:true, fontSize:FS_TITLE, color:COL_NAVY, alignment:"center", margin:[0,0,0,2] },
        { text: T.titleB, italics:true, fontSize:FS_LG, color:COL_GRAY, alignment:"center", margin:[0,0,0,2] },
        { text: "So/No: "+(form.contractNumber||"......"), fontSize:FS_SM, color:COL_LIGHT, alignment:"center", margin:[0,0,0,14] },
        ...bi(T.legalBasis, T.legalBasisB, { spaceAfter:8 }),
        ...bi(T.today(form.contractDate), T.todayB(form.contractDate), { spaceAfter:10 }),
        ...partyBlock(T.seller,T.sellerB,COMPANY.name,COMPANY.nameEn,COMPANY.representative,COMPANY.representativeEn,COMPANY.position,COMPANY.positionEn,COMPANY.address,COMPANY.addressEn,COMPANY.phone,COMPANY.mst,COMPANY.bankAccount,COMPANY.bankName,COMPANY.bankNameEn),
        ...partyBlock(T.buyer,T.buyerB,form.buyerName,form.buyerNameEn||form.buyerName,form.buyerRep,form.buyerRepEn,form.buyerPosition,form.buyerPositionEn,form.buyerAddress,form.buyerAddressEn,form.buyerTel,form.buyerTaxCode,form.buyerAccountNo,form.buyerBank,form.buyerBankEn),
        ...bi(T.agree, T.agreeB, { spaceAfter:12 }),
        ...artHeading(T.art1, T.art1B),
        ...bi("1.1 "+T.art1_1, T.art1_1B, { bold:true, spaceAfter:2 }),
        ...bi(T.art1_desc, T.art1_descB, { spaceAfter:4 }),
        itemsTable,
        { text:T.inWords(numberToWordsVN(total)), alignment:"right", bold:true, fontSize:FS_SM, margin:[0,2,0,1] },
        { text:T.inWordsB(numberToWordsEN(total)), alignment:"right", italics:true, color:COL_GRAY, fontSize:FS_SM*0.9, margin:[0,0,0,8] },
        ...bi("1.2 "+T.art1_2+": "+T.quality, T.art1_2B+": "+T.qualityB, { spaceAfter:2 }),

        ...artHeading(T.art3, T.art3B),
        ...bi(T.art3_1(form.deliveryDays), T.art3_1B(form.deliveryDays), { spaceAfter:2 }),
        ...bi(T.art3_2(form.deliveryPlace), T.art3_2B(form.deliveryPlaceEn||form.deliveryPlace), { spaceAfter:10 }),
        ...artHeading(T.art4, T.art4B),
        ...bi(clause("art4_1_vi",T.art4_1), clauseB("art4_1_b",T.art4_1B), { spaceAfter:2 }),
        ...bi(clause("art4_2_vi",T.art4_2), clauseB("art4_2_b",T.art4_2B), { spaceAfter:2 }),
        ...bi(clause("art4_3_vi",T.art4_3), clauseB("art4_3_b",T.art4_3B), { spaceAfter:2 }),
        ...bi(clause("art4_4_vi",T.art4_4), clauseB("art4_4_b",T.art4_4B), { spaceAfter:10 }),
        ...artHeading(T.art5, T.art5B),

        ...bi("6.1 "+clause("art6_1_vi",T.art6_1),"6.1 "+clauseB("art6_1_b",T.art6_1B),{ spaceAfter:2 }),
        ...bi("6.2 "+clause("art6_2_vi",T.art6_2),"6.2 "+clauseB("art6_2_b",T.art6_2B),{ spaceAfter:2 }),
        ...bi("6.3 "+clause("art6_3_vi",T.art6_3),"6.3 "+clauseB("art6_3_b",T.art6_3B),{ spaceAfter:2 }),
        ...bi("6.4 "+clause("art6_4_vi",T.art6_4),"6.4 "+clauseB("art6_4_b",T.art6_4B),{ spaceAfter:2 }),
        ...bi("6.5 "+clause("art6_5_vi",T.art6_5),"6.5 "+clauseB("art6_5_b",T.art6_5B),{ spaceAfter:16 }),
        signTable,

              <div style={{textAlign:"center",width:"45%"}}>
                <div style={{fontWeight:700}}>{T.signSeller}</div>
                <div style={{fontStyle:"italic",color:"#555",fontSize:`${fontSize*0.85}pt`,marginBottom:60}}>{T.signSellerB}</div>
                <div style={{fontWeight:700}}>{COMPANY.representative}</div>
              </div>
              <div style={{textAlign:"center",width:"45%"}}>
                <div style={{fontWeight:700}}>{T.signBuyer}</div>
                <div style={{fontStyle:"italic",color:"#555",fontSize:`${fontSize*0.85}pt`,marginBottom:60}}>{T.signBuyerB}</div>
                <div style={{fontWeight:700}}>{form.buyerRep}</div>
              </div>
            </div>
          </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Đóng</button>
          <button className="btn btn-ghost" onClick={handleSave}>💾 Lưu hợp đồng {saveMsg && <span style={{color:"#16a34a",marginLeft:6}}>{saveMsg}</span>}</button>
          <button className="btn btn-ghost" onClick={handlePDFClick} disabled={pdfLoadingC} style={{minWidth:120}}>
            {pdfLoadingC ? "⏳ Đang tạo..." : "📄 Xuất PDF"}
          </button>
          <button className="btn btn-primary" onClick={handleWordClick} disabled={wordLoading} style={{minWidth:120}}>
            {wordLoading ? "⏳ Đang tạo..." : "📝 Xuất Word"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// PHẦN 9 – ỨNG DỤNG CHÍNH (App)
// ═══════════════════════════════════════════════════════════════════════════════
// Quản lý state toàn cục: quotes, modal đang mở, tìm kiếm, xác nhận xóa...
// Render: Topbar → Sidebar → Content (Dashboard / Danh sách báo giá / Catalog)




// ═══════════════════════════════════════════════════════════════════════════════
// SETTINGS VIEW – Cài đặt hệ thống & thông tin công ty
// ═══════════════════════════════════════════════════════════════════════════════
const DEFAULT_COMPANY = {
  name:"", nameEn:"", short:"", mst:"", address:"", addressEn:"",
  phone:"", email:"", representative:"", representativeEn:"",
  position:"Giám Đốc", positionEn:"Director",
  bankAccount:"", bankName:"", bankNameEn:"", logo:"",
};

function SettingsView({ onCompanyUpdate }) {
  const [company,  setCompany]  = React.useState({ ...DEFAULT_COMPANY, ...COMPANY });
  const [gasUrl,   setGasUrlS]  = React.useState(getGasUrl());
  const [saving,   setSaving]   = React.useState(false);
  const [testMsg,  setTestMsg]  = React.useState("");
  const [saveMsg,  setSaveMsg]  = React.useState("");
  const [logoPreview, setLogoPreview] = React.useState(COMPANY.logo || "");
  const fileRef = React.useRef(null);
  // Contract defaults
  const cd = (CONTRACT_DEFAULTS && CONTRACT_DEFAULTS.vi_en) || {};
  const [deliveryDays,  setDeliveryDays]  = React.useState(cd.deliveryDays  || "05");
  const [paymentTerm,   setPaymentTerm]   = React.useState(cd.paymentTerm   || "thanh toán 100% giá trị hợp đồng sau khi bàn giao và lắp đặt thiết bị.");
  const [paymentTermEn, setPaymentTermEn] = React.useState(cd.paymentTermEn || "Pay 100% of the contract value after handover and installation of the equipment.");
  // Quick catalog
  const [quickCatalog, setQuickCatalog] = React.useState(PRODUCT_CATALOG.join("\n"));
  // Đổi credentials
  const [currentPw,  setCurrentPw]  = React.useState("");
  const [newPw,      setNewPw]      = React.useState("");
  const [confirmPw,  setConfirmPw]  = React.useState("");
  const [newSecret,  setNewSecret]  = React.useState("");
  const [credMsg,    setCredMsg]    = React.useState("");
  const [credSaving, setCredSaving] = React.useState(false);
  const [showPw,     setShowPw]     = React.useState(false);

  const setC = (f, v) => setCompany(p => ({ ...p, [f]: v }));

  const handleChangeCredentials = async () => {
    if (!currentPw) { setCredMsg("❌ Nhập mật khẩu hiện tại"); return; }
    if (newPw && newPw.length < 6) { setCredMsg("❌ Mật khẩu mới phải ít nhất 6 ký tự"); return; }
    if (newPw && newPw !== confirmPw) { setCredMsg("❌ Mật khẩu mới không khớp"); return; }
    if (newSecret && newSecret.length < 8) { setCredMsg("❌ API Secret phải ít nhất 8 ký tự"); return; }
    if (!newPw && !newSecret) { setCredMsg("❌ Nhập mật khẩu mới hoặc API Secret mới"); return; }
    setCredSaving(true); setCredMsg("");
    try {
      const token = localStorage.getItem(LS_TOKEN) || "";
      const resp = await fetch(getGasUrl(), {
        method: "POST",
        body: JSON.stringify({ token, action: "change_credentials", payload: {
          currentPassword: currentPw,
          newPassword: newPw || undefined,
          newSecret:   newSecret || undefined,
        }}),
      });
      const data = await resp.json();
      if (!data.ok) throw new Error(data.error);
      setCredMsg("✅ Đã đổi thành công! Đang đăng xuất...");
      setCurrentPw(""); setNewPw(""); setConfirmPw(""); setNewSecret("");
      // Đăng xuất bắt buộc vì token cũ đã bị xóa trên server
      setTimeout(() => logout(), 2000);
    } catch(e) {
      setCredMsg("❌ " + e.message);
    } finally { setCredSaving(false); }
  };

  const handleLogoUpload = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { setLogoPreview(ev.target.result); setC("logo", ev.target.result); };
    reader.readAsDataURL(file);
  };

  const handleTestGas = async () => {
    setTestMsg("⏳ Đang kiểm tra...");
    try {
      const resp = await fetch(gasUrl.trim() + "?action=ping");
      const data = await resp.json();
      setTestMsg(data.ok || data.error === "Unauthorized" ? "✅ Kết nối thành công!" : "❌ " + (data.error || "Lỗi không xác định"));
    } catch(e) { setTestMsg("❌ Không kết nối được: " + e.message); }
    setTimeout(() => setTestMsg(""), 4000);
  };

  const handleSave = async () => {
    setSaving(true);
    try {
      // Lưu GAS URL vào localStorage
      setGasUrl(gasUrl.trim());
      // Lưu thông tin công ty lên Drive qua GAS
      const token = localStorage.getItem(LS_TOKEN) || "";
      const resp = await fetch(getGasUrl(), {
        method: "POST",
        body: JSON.stringify({ token, action: "save_settings", payload: {
          company,
          contractDefaults: {
            vi_en: {
              deliveryDays:    deliveryDays,
              deliveryPlace:   "",
              deliveryPlaceEn: "",
              paymentTerm:     paymentTerm,
              paymentTermEn:   paymentTermEn,
            }
          },
          productCatalog: quickCatalog.split("\n").map(s=>s.trim()).filter(Boolean),
        }}),
      });
      const data = await resp.json();
      if (!data.ok) throw new Error(data.error);
      // Cập nhật COMPANY object trong memory
      Object.assign(COMPANY, company);
      // Cập nhật CONTRACT_DEFAULTS trong memory
      if (!CONTRACT_DEFAULTS.vi_en) CONTRACT_DEFAULTS.vi_en = {};
      Object.assign(CONTRACT_DEFAULTS.vi_en, { deliveryDays, paymentTerm, paymentTermEn });
      // Cập nhật PRODUCT_CATALOG trong memory
      const newCatalog = quickCatalog.split("\n").map(s=>s.trim()).filter(Boolean);
      PRODUCT_CATALOG.splice(0, PRODUCT_CATALOG.length, ...newCatalog);
      setSaveMsg("✅ Đã lưu");
      setTimeout(() => setSaveMsg(""), 2500);
      if (typeof onCompanyUpdate === "function") onCompanyUpdate({ ...company });
    } catch(e) {
      setSaveMsg("❌ Lỗi: " + e.message);
      setTimeout(() => setSaveMsg(""), 4000);
    } finally { setSaving(false); }
  };

  return (
    <div>
      <div style={{ marginBottom:20, display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10 }}>
        <div>
          <h2 style={{ fontSize:18, fontWeight:600, color:"#1a2540", marginBottom:4 }}>⚙️ Cài đặt hệ thống</h2>
          <p style={{ color:"#888", fontSize:13 }}>Thông tin công ty sẽ hiển thị trên báo giá, hợp đồng, biên bản</p>
        </div>
        <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
          {saving ? "⏳ Đang lưu..." : "💾 Lưu cài đặt"}{saveMsg && <span style={{marginLeft:8,fontSize:12}}>{saveMsg}</span>}
        </button>
      </div>

      {/* GAS URL */}
      <div className="card" style={{ marginBottom:16 }}>
        <div className="card-header"><span style={{fontWeight:600}}>🔗 Kết nối Google Apps Script</span></div>
        <div className="card-body">
          <div className="form-group">
            <label>GAS Web App URL</label>
            <div style={{ display:"flex", gap:8 }}>
              <input className="form-control" value={gasUrl} onChange={e => { setGasUrlS(e.target.value); setTestMsg(""); }}
                placeholder="https://script.google.com/macros/s/.../exec" style={{ flex:1 }} />
              <button className="btn btn-ghost" onClick={handleTestGas} style={{ whiteSpace:"nowrap" }}>🔌 Kiểm tra</button>
            </div>
            {testMsg && <div style={{ marginTop:6, fontSize:12, color: testMsg.startsWith("✅") ? "#16a34a" : testMsg.startsWith("⏳") ? "#888" : "#dc2626" }}>{testMsg}</div>}
            <div style={{ fontSize:11, color:"#aaa", marginTop:4 }}>URL này được lưu trong trình duyệt. Mỗi máy/thiết bị cần nhập 1 lần.</div>
          </div>
        </div>
      </div>

      {/* Logo */}
      <div className="card" style={{ marginBottom:16 }}>
        <div className="card-header"><span style={{fontWeight:600}}>🏢 Logo công ty</span></div>
        <div className="card-body">
          <div style={{ display:"flex", alignItems:"center", gap:16 }}>
            <div style={{ width:80, height:80, border:"1px solid #e5e3dc", borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", background:"#f9f8f5", overflow:"hidden", flexShrink:0 }}>
              {logoPreview ? <img src={logoPreview} alt="Logo" style={{ width:"100%", height:"100%", objectFit:"contain" }} /> : <span style={{ fontSize:28, color:"#ddd" }}>🏢</span>}
            </div>
            <div>
              <button className="btn btn-ghost btn-sm" onClick={() => fileRef.current && fileRef.current.click()}>📁 Chọn logo</button>
              {logoPreview && <button className="btn btn-ghost btn-sm" style={{ marginLeft:8, color:"#dc2626" }} onClick={() => { setLogoPreview(""); setC("logo",""); }}>✕ Xóa</button>}
              <div style={{ fontSize:11, color:"#aaa", marginTop:4 }}>PNG, JPG — nên dùng ảnh vuông, nền trắng</div>
              <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }} onChange={handleLogoUpload} />
            </div>
          </div>
        </div>
      </div>

      {/* Thông tin công ty */}
      <div className="card" style={{ marginBottom:16 }}>
        <div className="card-header"><span style={{fontWeight:600}}>📋 Thông tin công ty</span></div>
        <div className="card-body">
          <div className="form-row form-row-2" style={{ marginBottom:12 }}>
            <div className="form-group">
              <label>Tên công ty (Tiếng Việt)</label>
              <input className="form-control" value={company.name} onChange={e => setC("name", e.target.value)} placeholder="CÔNG TY TNHH ABC" />
            </div>
            <div className="form-group">
              <label>Tên công ty (English)</label>
              <input className="form-control" value={company.nameEn} onChange={e => setC("nameEn", e.target.value)} placeholder="ABC CO., LTD" />
            </div>
          </div>
          <div className="form-row form-row-2" style={{ marginBottom:12 }}>
            <div className="form-group">
              <label>Tên viết tắt / thương hiệu</label>
              <input className="form-control" value={company.short} onChange={e => setC("short", e.target.value)} placeholder="ABC" />
            </div>
            <div className="form-group">
              <label>Mã số thuế</label>
              <input className="form-control" value={company.mst} onChange={e => setC("mst", e.target.value)} placeholder="0123456789" />
            </div>
          </div>
          <div className="form-row form-row-2" style={{ marginBottom:12 }}>
            <div className="form-group">
              <label>Địa chỉ (Tiếng Việt)</label>
              <input className="form-control" value={company.address} onChange={e => setC("address", e.target.value)} placeholder="Số 1, Đường ABC, Quận 1, TP.HCM" />
            </div>
            <div className="form-group">
              <label>Địa chỉ (English)</label>
              <input className="form-control" value={company.addressEn} onChange={e => setC("addressEn", e.target.value)} placeholder="No.1 ABC Street, District 1, HCMC" />
            </div>
          </div>
          <div className="form-row form-row-3" style={{ marginBottom:12 }}>
            <div className="form-group">
              <label>Điện thoại</label>
              <input className="form-control" value={company.phone} onChange={e => setC("phone", e.target.value)} placeholder="0909 123 456" />
            </div>
            <div className="form-group">
              <label>Email</label>
              <input className="form-control" value={company.email} onChange={e => setC("email", e.target.value)} placeholder="info@abc.com" />
            </div>
            <div className="form-group">
              <label>Website (tùy chọn)</label>
              <input className="form-control" value={company.website||""} onChange={e => setC("website", e.target.value)} placeholder="www.abc.com" />
            </div>
          </div>
        </div>
      </div>

      {/* Người đại diện */}
      <div className="card" style={{ marginBottom:16 }}>
        <div className="card-header"><span style={{fontWeight:600}}>👤 Người đại diện pháp lý</span></div>
        <div className="card-body">
          <div className="form-row form-row-2" style={{ marginBottom:12 }}>
            <div className="form-group">
              <label>Họ tên (Tiếng Việt)</label>
              <input className="form-control" value={company.representative} onChange={e => setC("representative", e.target.value)} placeholder="NGUYỄN VĂN A" />
            </div>
            <div className="form-group">
              <label>Họ tên (English)</label>
              <input className="form-control" value={company.representativeEn} onChange={e => setC("representativeEn", e.target.value)} placeholder="Mr. NGUYEN VAN A" />
            </div>
          </div>
          <div className="form-row form-row-2">
            <div className="form-group">
              <label>Chức vụ (Tiếng Việt)</label>
              <input className="form-control" value={company.position} onChange={e => setC("position", e.target.value)} placeholder="Giám Đốc" />
            </div>
            <div className="form-group">
              <label>Chức vụ (English)</label>
              <input className="form-control" value={company.positionEn} onChange={e => setC("positionEn", e.target.value)} placeholder="Director" />
            </div>
          </div>
        </div>
      </div>

      {/* Tài khoản ngân hàng */}
      <div className="card" style={{ marginBottom:16 }}>
        <div className="card-header"><span style={{fontWeight:600}}>🏦 Tài khoản ngân hàng</span></div>
        <div className="card-body">
          <div className="form-row form-row-3">
            <div className="form-group">
              <label>Số tài khoản</label>
              <input className="form-control" value={company.bankAccount} onChange={e => setC("bankAccount", e.target.value)} placeholder="0123456789" />
            </div>
            <div className="form-group">
              <label>Tên ngân hàng (Tiếng Việt)</label>
              <input className="form-control" value={company.bankName} onChange={e => setC("bankName", e.target.value)} placeholder="Ngân hàng TMCP ABC" />
            </div>
            <div className="form-group">
              <label>Tên ngân hàng (English)</label>
              <input className="form-control" value={company.bankNameEn} onChange={e => setC("bankNameEn", e.target.value)} placeholder="ABC Commercial Bank" />
            </div>
          </div>
        </div>
      </div>

      {/* Contract defaults */}
      <div className="card" style={{ marginBottom:16 }}>
        <div className="card-header"><span style={{fontWeight:600}}>📃 Điều khoản hợp đồng mặc định</span></div>
        <div className="card-body">
          <div className="form-row form-row-2" style={{ marginBottom:12 }}>
            <div className="form-group">
              <label>Số ngày giao hàng mặc định</label>
              <input className="form-control" value={deliveryDays} onChange={e => setDeliveryDays(e.target.value)} placeholder="05" />
            </div>
          </div>
          <div className="form-group" style={{ marginBottom:12 }}>
            <label>Điều khoản thanh toán mặc định (Tiếng Việt)</label>
            <textarea className="form-control" rows={2} value={paymentTerm} onChange={e => setPaymentTerm(e.target.value)} />
          </div>
          <div className="form-group">
            <label>Điều khoản thanh toán mặc định (English)</label>
            <textarea className="form-control" rows={2} value={paymentTermEn} onChange={e => setPaymentTermEn(e.target.value)} />
          </div>
        </div>
      </div>

      {/* Quick product catalog */}
      <div className="card" style={{ marginBottom:16 }}>
        <div className="card-header">
          <span style={{fontWeight:600}}>📦 Danh sách sản phẩm gợi ý nhanh</span>
          <span style={{fontSize:11,color:"#888"}}>Mỗi dòng 1 tên sản phẩm — hiển thị khi gợi ý tự động</span>
        </div>
        <div className="card-body">
          <textarea className="form-control" rows={8}
            value={quickCatalog}
            onChange={e => setQuickCatalog(e.target.value)}
            placeholder={"Máy in HP LaserJet Pro M209dw\nHộp mực in HP CF276A\nCáp USB 3.0 1.5m\n..."} />
          <div style={{fontSize:11,color:"#aaa",marginTop:4}}>
            {quickCatalog.split("\n").filter(s=>s.trim()).length} sản phẩm
          </div>
        </div>
      </div>

      {/* Đổi mật khẩu & API Secret */}
      <div className="card" style={{ marginBottom:16 }}>
        <div className="card-header"><span style={{fontWeight:600}}>🔐 Đổi mật khẩu & API Secret</span></div>
        <div className="card-body">
          <div style={{fontSize:12,color:"#888",marginBottom:14,lineHeight:1.6}}>
            Mật khẩu dùng để đăng nhập app. API Secret dùng để xác thực giữa app và GAS.
            Sau khi đổi, tất cả thiết bị đang đăng nhập sẽ bị đăng xuất.
          </div>

          <div className="form-group">
            <label>Mật khẩu hiện tại *</label>
            <div style={{position:"relative"}}>
              <input className="form-control" type={showPw?"text":"password"}
                value={currentPw} onChange={e=>setCurrentPw(e.target.value)}
                placeholder="Nhập mật khẩu đang dùng..." style={{paddingRight:40}} />
              <button onClick={()=>setShowPw(s=>!s)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#999",fontSize:15}}>
                {showPw?"🙈":"👁️"}
              </button>
            </div>
          </div>

          <div style={{background:"#f9f8f5",borderRadius:8,padding:"12px 14px",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:600,color:"#555",marginBottom:10}}>Mật khẩu đăng nhập mới (để trống nếu không đổi)</div>
            <div className="form-row form-row-2">
              <div className="form-group" style={{marginBottom:0}}>
                <label>Mật khẩu mới</label>
                <input className="form-control" type={showPw?"text":"password"}
                  value={newPw} onChange={e=>setNewPw(e.target.value)}
                  placeholder="Tối thiểu 6 ký tự" />
              </div>
              <div className="form-group" style={{marginBottom:0}}>
                <label>Xác nhận mật khẩu mới</label>
                <input className="form-control" type={showPw?"text":"password"}
                  value={confirmPw} onChange={e=>setConfirmPw(e.target.value)}
                  placeholder="Nhập lại mật khẩu mới"
                  style={{borderColor: confirmPw && newPw && confirmPw!==newPw ? "#dc2626" : ""}} />
              </div>
            </div>
          </div>

          <div style={{background:"#f9f8f5",borderRadius:8,padding:"12px 14px",marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:600,color:"#555",marginBottom:10}}>API Secret mới (để trống nếu không đổi)</div>
            <div className="form-group" style={{marginBottom:0}}>
              <label>API Secret</label>
              <input className="form-control" type={showPw?"text":"password"}
                value={newSecret} onChange={e=>setNewSecret(e.target.value)}
                placeholder="Tối thiểu 8 ký tự, nên dùng ký tự đặc biệt" />
              <div style={{fontSize:11,color:"#aaa",marginTop:4}}>VD: MyApp@2025!xyz — chuỗi càng phức tạp càng tốt</div>
            </div>
          </div>

          {credMsg && (
            <div style={{padding:"8px 12px",borderRadius:6,marginBottom:12,fontSize:13,
              background: credMsg.startsWith("✅") ? "#dcfce7" : "#fee2e2",
              color: credMsg.startsWith("✅") ? "#166534" : "#dc2626"}}>
              {credMsg}
            </div>
          )}

          <button className="btn btn-primary" onClick={handleChangeCredentials} disabled={credSaving||!currentPw}>
            {credSaving ? "⏳ Đang xử lý..." : "🔐 Đổi credentials"}
          </button>
        </div>
      </div>

      {/* Xóa dữ liệu setup để nhập lại */}
      <div className="card" style={{ borderColor:"#fee2e2" }}>
        <div className="card-header" style={{ background:"#fff5f5" }}><span style={{fontWeight:600, color:"#dc2626"}}>⚠️ Vùng nguy hiểm</span></div>
        <div className="card-body" style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:12 }}>
          <div>
            <div style={{ fontWeight:500, fontSize:13 }}>Đặt lại kết nối GAS</div>
            <div style={{ fontSize:12, color:"#888" }}>Xóa GAS URL đã lưu — app sẽ quay về màn hình thiết lập lần đầu</div>
          </div>
          <button className="btn btn-danger btn-sm" onClick={() => {
            if (!window.confirm("Xóa GAS URL? App sẽ quay về màn hình thiết lập.")) return;
            localStorage.removeItem(LS_GAS_URL);
            localStorage.removeItem(LS_TOKEN);
            location.reload();
          }}>Đặt lại</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// NOTES – Ghi chú nội bộ (không xuất ra ngoài)
// ═══════════════════════════════════════════════════════════════════════════════
const NOTE_COLORS = [
  "#fff9db","#d3f9d8","#d0ebff","#ffe8cc","#f8d7e3","#e9ecef","#fff0f6","#e8f5e9"
];
const NOTE_COLOR_NAMES = ["Vàng","Xanh lá","Xanh dương","Cam","Hồng","Xám","Tím","Lá"];

function genNoteId() { return "n" + Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

// ── NoteFormModal ─────────────────────────────────────────────────────────────
function NoteFormModal({ note, allTags, onSave, onClose }) {
  const isNew = !note;
  const [form, setForm] = React.useState(note ? { ...note } : {
    id: genNoteId(), title: "", body: "", tags: [], color: NOTE_COLORS[0],
    pinned: false, createdAt: new Date().toISOString(),
  });
  const [tagInput, setTagInput] = React.useState("");
  const set = (f, v) => setForm(p => ({ ...p, [f]: v }));

  const addTag = (tag) => {
    tag = tag.trim();
    if (!tag || form.tags.includes(tag)) return;
    set("tags", [...form.tags, tag]);
    setTagInput("");
  };
  const removeTag = (tag) => set("tags", form.tags.filter(t => t !== tag));

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ maxWidth:560, height:"auto", maxHeight:"90vh" }}>
        <div className="modal-header">
          <span className="modal-title">{isNew ? "📝 Ghi chú mới" : "✏️ Sửa ghi chú"}</span>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body" style={{ display:"flex", flexDirection:"column", gap:14 }}>

          {/* Màu nền */}
          <div className="form-group" style={{ marginBottom:0 }}>
            <label>Màu nền</label>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:4 }}>
              {NOTE_COLORS.map((col, i) => (
                <button key={col} onClick={() => set("color", col)} title={NOTE_COLOR_NAMES[i]}
                  style={{ width:28, height:28, borderRadius:"50%", background:col, border: form.color===col ? "2px solid #1a2540" : "1px solid #d1cfc6", cursor:"pointer" }} />
              ))}
            </div>
          </div>

          <div className="form-group">
            <label>Tiêu đề</label>
            <input className="form-control" value={form.title} onChange={e => set("title", e.target.value)}
              placeholder="Tiêu đề ghi chú..." autoFocus />
          </div>

          <div className="form-group">
            <label>Nội dung <span style={{fontSize:11,color:"#aaa",fontWeight:400}}>(chỉ dùng nội bộ, không xuất ra ngoài)</span></label>
            <textarea className="form-control" rows={8} value={form.body} onChange={e => set("body", e.target.value)}
              placeholder="Ghi chú bất kỳ thông tin nội bộ: giá vốn, ghi nhớ, thông tin đàm phán..." />
          </div>

          {/* Tags */}
          <div className="form-group" style={{ marginBottom:0 }}>
            <label>Nhãn (tags)</label>
            <div style={{ display:"flex", gap:8, marginBottom:6, flexWrap:"wrap" }}>
              {form.tags.map(tag => (
                <span key={tag} style={{ background:"#1a2540", color:"#fff", padding:"2px 8px", borderRadius:10, fontSize:12, display:"flex", alignItems:"center", gap:4 }}>
                  {tag}
                  <button onClick={() => removeTag(tag)} style={{ background:"none", border:"none", color:"#fff", cursor:"pointer", padding:0, fontSize:14, lineHeight:1 }}>×</button>
                </span>
              ))}
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <input className="form-control" style={{ flex:1 }} value={tagInput}
                onChange={e => setTagInput(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" || e.key === ",") { e.preventDefault(); addTag(tagInput); } }}
                placeholder="Nhập tag rồi Enter... (VD: khách VIP, ưu tiên, nội bộ)" />
              <button className="btn btn-ghost btn-sm" onClick={() => addTag(tagInput)}>+ Thêm</button>
            </div>
            {/* Gợi ý tag đang có */}
            {allTags.filter(t => !form.tags.includes(t) && t.toLowerCase().includes(tagInput.toLowerCase()) && tagInput).length > 0 && (
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginTop:6 }}>
                {allTags.filter(t => !form.tags.includes(t) && t.toLowerCase().includes(tagInput.toLowerCase()) && tagInput).slice(0,8).map(t => (
                  <span key={t} className="note-tag" onClick={() => addTag(t)}>{t}</span>
                ))}
              </div>
            )}
          </div>

          {/* Ghim */}
          <label style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", fontSize:13 }}>
            <input type="checkbox" checked={form.pinned} onChange={e => set("pinned", e.target.checked)} />
            📌 Ghim ghi chú này lên đầu
          </label>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Hủy</button>
          <button className="btn btn-primary" onClick={() => {
            if (!form.title.trim() && !form.body.trim()) { alert("Vui lòng nhập tiêu đề hoặc nội dung"); return; }
            onSave({ ...form, updatedAt: new Date().toISOString() });
          }}>💾 Lưu ghi chú</button>
        </div>
      </div>
    </div>
  );
}

// ── NotesView ─────────────────────────────────────────────────────────────────
function NotesView() {
  const [notes, setNotes]       = React.useState([]);
  const [loaded, setLoaded]     = React.useState(false);
  const [editNote, setEditNote] = React.useState(null);
  const [showForm, setShowForm] = React.useState(false);
  const [search, setSearch]     = React.useState("");
  const [activeTag, setActiveTag] = React.useState("all");
  const [viewMode, setViewMode] = React.useState("grid"); // "grid" | "list"

  React.useEffect(() => {
    loadNotes().then(n => { setNotes(n || []); setLoaded(true); }).catch(() => setLoaded(true));
  }, []);

  const persist = (n) => { setNotes(n); saveNotes(n); };

  const saveNote = (note) => {
    const idx = notes.findIndex(n => n.id === note.id);
    const updated = idx >= 0 ? notes.map(n => n.id === note.id ? note : n) : [note, ...notes];
    persist(updated);
    setShowForm(false); setEditNote(null);
  };

  const deleteNote = (id) => { if (window.confirm("Xóa ghi chú này?")) persist(notes.filter(n => n.id !== id)); };
  const togglePin = (id) => persist(notes.map(n => n.id === id ? { ...n, pinned: !n.pinned } : n));

  // Tất cả tags đang có
  const allTags = [...new Set(notes.flatMap(n => n.tags || []))].sort();

  const filtered = notes
    .filter(n => {
      const matchTag = activeTag === "all" || (n.tags || []).includes(activeTag);
      const matchSearch = !search ||
        (n.title || "").toLowerCase().includes(search.toLowerCase()) ||
        (n.body  || "").toLowerCase().includes(search.toLowerCase()) ||
        (n.tags  || []).some(t => t.toLowerCase().includes(search.toLowerCase()));
      return matchTag && matchSearch;
    })
    .sort((a, b) => {
      if (a.pinned && !b.pinned) return -1;
      if (!a.pinned && b.pinned) return 1;
      return (b.updatedAt || b.createdAt || "").localeCompare(a.updatedAt || a.createdAt || "");
    });

  const fmtDate = (iso) => {
    if (!iso) return "";
    const d = new Date(iso);
    return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
  };

  if (!loaded) return <div className="empty-state"><div style={{fontSize:32}}>⏳</div><h3>Đang tải ghi chú...</h3></div>;

  return (
    <div>
      {/* Header */}
      <div style={{ marginBottom:20, display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10 }}>
        <div>
          <h2 style={{ fontSize:18, fontWeight:600, color:"#1a2540", marginBottom:4 }}>📝 Ghi chú nội bộ</h2>
          <p style={{ color:"#888", fontSize:13 }}>{notes.length} ghi chú · Chỉ hiển thị nội bộ, không xuất ra báo giá/hợp đồng</p>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button className="btn btn-ghost btn-sm" onClick={() => setViewMode(v => v==="grid"?"list":"grid")} title="Chuyển chế độ xem">
            {viewMode==="grid" ? "☰ List" : "⊞ Grid"}
          </button>
          <button className="btn btn-primary" onClick={() => { setEditNote(null); setShowForm(true); }}>+ Ghi chú mới</button>
        </div>
      </div>

      {/* Filter bar */}
      <div className="filter-bar" style={{ marginBottom:14 }}>
        <input className="search-input" placeholder="🔍 Tìm trong ghi chú..." value={search} onChange={e => setSearch(e.target.value)} />
      </div>

      {/* Tags filter */}
      {allTags.length > 0 && (
        <div className="note-tag-list" style={{ marginBottom:14 }}>
          <span className={`note-tag ${activeTag==="all"?"active":""}`} onClick={() => setActiveTag("all")}>Tất cả</span>
          {allTags.map(tag => (
            <span key={tag} className={`note-tag ${activeTag===tag?"active":""}`} onClick={() => setActiveTag(t => t===tag?"all":tag)}>
              {tag}
            </span>
          ))}
        </div>
      )}

      {notes.length === 0 ? (
        <div className="empty-state">
          <div style={{ fontSize:40 }}>📝</div>
          <h3>Chưa có ghi chú nào</h3>
          <p style={{ fontSize:13 }}>Dùng để lưu thông tin nội bộ: giá vốn, ghi nhớ quan trọng, thông tin đàm phán...</p>
          <button className="btn btn-primary" style={{ marginTop:12 }} onClick={() => setShowForm(true)}>+ Tạo ghi chú đầu tiên</button>
        </div>
      ) : filtered.length === 0 ? (
        <div className="empty-state">
          <div style={{ fontSize:32 }}>🔍</div>
          <h3>Không tìm thấy ghi chú</h3>
        </div>
      ) : viewMode === "grid" ? (
        <div className="notes-grid">
          {filtered.map(note => (
            <div key={note.id} className={`note-card ${note.pinned?"pinned":""}`} style={{ background: note.color || "#fff" }}>
              <div className="note-actions">
                <button className="note-pin-btn" onClick={() => togglePin(note.id)} title={note.pinned?"Bỏ ghim":"Ghim"}>
                  {note.pinned ? "📌" : "📍"}
                </button>
                <button className="note-pin-btn" onClick={() => { setEditNote(note); setShowForm(true); }} title="Sửa">✏️</button>
                <button className="note-pin-btn" onClick={() => deleteNote(note.id)} title="Xóa" style={{ color:"#dc2626" }}>🗑️</button>
              </div>
              {note.pinned && <div style={{ fontSize:11, color:"#f59e0b", fontWeight:600, marginBottom:4 }}>📌 Đã ghim</div>}
              {note.title && <div className="note-title">{note.title}</div>}
              {note.body && (
                <div className="note-body" style={{ maxHeight:120, overflow:"hidden", maskImage:"linear-gradient(to bottom,black 70%,transparent 100%)", WebkitMaskImage:"linear-gradient(to bottom,black 70%,transparent 100%)" }}>
                  {note.body}
                </div>
              )}
              {(note.tags||[]).length > 0 && (
                <div className="note-tag-list" style={{ marginTop:8 }}>
                  {note.tags.map(t => <span key={t} className="note-tag" onClick={() => setActiveTag(t)}>{t}</span>)}
                </div>
              )}
              <div className="note-meta">
                <span>🕐 {fmtDate(note.updatedAt || note.createdAt)}</span>
              </div>
            </div>
          ))}
        </div>
      ) : (
        /* List mode */
        <div className="card">
          {filtered.map(note => (
            <div key={note.id} style={{ padding:"12px 16px", borderBottom:"1px solid #f0ede6", display:"flex", gap:12, alignItems:"flex-start", background: note.color || "#fff" }}>
              <div style={{ width:6, borderRadius:3, alignSelf:"stretch", background: note.pinned ? "#f59e0b" : "transparent", flexShrink:0 }} />
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                  <div>
                    {note.title && <div style={{ fontWeight:600, fontSize:14, color:"#1a2540" }}>{note.title}</div>}
                    {note.body && <div style={{ fontSize:13, color:"#555", marginTop:2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:500 }}>{note.body.slice(0,120)}{note.body.length>120?"…":""}</div>}
                  </div>
                  <div style={{ display:"flex", gap:4, flexShrink:0, marginLeft:8 }}>
                    <button onClick={() => togglePin(note.id)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:14 }}>{note.pinned?"📌":"📍"}</button>
                    <button onClick={() => { setEditNote(note); setShowForm(true); }} style={{ background:"none", border:"none", cursor:"pointer", color:"#888", fontSize:14 }}>✏️</button>
                    <button onClick={() => deleteNote(note.id)} style={{ background:"none", border:"none", cursor:"pointer", color:"#dc2626", fontSize:14 }}>🗑️</button>
                  </div>
                </div>
                <div style={{ display:"flex", gap:6, marginTop:5, flexWrap:"wrap", alignItems:"center" }}>
                  {(note.tags||[]).map(t => <span key={t} className="note-tag">{t}</span>)}
                  <span style={{ fontSize:11, color:"#aaa" }}>🕐 {fmtDate(note.updatedAt||note.createdAt)}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {showForm && (
        <NoteFormModal
          note={editNote}
          allTags={allTags}
          onSave={saveNote}
          onClose={() => { setShowForm(false); setEditNote(null); }}
        />
      )}
    </div>
  );
}

// CONTRACTS VIEW – Danh sách hợp đồng đã soạn
// ═══════════════════════════════════════════════════════════════════════════════
function ContractsView({ quotes, onOpenContract }) {
  const [contracts, setContracts] = React.useState({});
  const [search, setSearch] = React.useState("");

  React.useEffect(() => {
    setContracts(_mem.contracts || {});
    // Lắng nghe khi contracts thay đổi từ modal
    const timer = setInterval(() => setContracts({...(_mem.contracts || {})}), 1500);
    return () => clearInterval(timer);
  }, []);

  // Gộp contract với thông tin báo giá tương ứng
  const rows = Object.values(contracts)
    .map(ct => {
      const quote = quotes.find(q => q.id === ct.quoteId) || null;
      return { ...ct, quote };
    })
    .filter(row => {
      if (!search) return true;
      const s = search.toLowerCase();
      return (
        (row.contractNumber || "").toLowerCase().includes(s) ||
        (row.buyerName || "").toLowerCase().includes(s) ||
        (row.quote?.quoteNumber || "").toLowerCase().includes(s)
      );
    })
    .sort((a, b) => (b.contractNumber || "").localeCompare(a.contractNumber || ""));

  return (
    <div>
      <div style={{ marginBottom: 20, display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
        <div>
          <h2 style={{ fontSize: 18, fontWeight: 600, color: "#1a2540", marginBottom: 4 }}>📃 Hợp đồng</h2>
          <p style={{ color: "#888", fontSize: 13 }}>{rows.length} hợp đồng đã soạn</p>
        </div>
      </div>

      <div className="filter-bar" style={{ marginBottom: 16 }}>
        <input className="search-input" placeholder="🔍 Tìm số HĐ, khách hàng, số BG..." value={search} onChange={e => setSearch(e.target.value)} />
      </div>

      {rows.length === 0 ? (
        <div className="empty-state">
          <div style={{ fontSize: 40 }}>📃</div>
          <h3>Chưa có hợp đồng nào</h3>
          <p style={{ fontSize: 13 }}>Mở một báo giá → bấm "Soạn hợp đồng" → Lưu hợp đồng để thấy ở đây</p>
        </div>
      ) : (
        <div className="card">
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Số hợp đồng</th>
                  <th>Khách hàng (Bên mua)</th>
                  <th>Liên kết báo giá</th>
                  <th>Ngôn ngữ</th>
                  <th style={{ textAlign: "right" }}>Tổng giá trị</th>
                  <th style={{ textAlign: "center" }}>Thao tác</th>
                </tr>
              </thead>
              <tbody>
                {rows.map(row => {
                  const total = row.quote ? calcItems(row.quote.items, row.quote.vatRate).total : 0;
                  const col = getCustomerColor(row.buyerName || row.quote?.customer || "");
                  return (
                    <tr key={row.quoteId}>
                      <td style={{ fontWeight: 600, color: "#1a2540" }}>
                        {row.contractNumber || <span style={{ color: "#aaa", fontStyle: "italic" }}>Chưa đặt số</span>}
                      </td>
                      <td>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <span style={{ background: col.bg, color: col.text, borderRadius: 4, padding: "2px 7px", fontSize: 11, fontWeight: 600, whiteSpace: "nowrap" }}>
                            {(row.buyerName || row.quote?.customer || "—").slice(0, 20)}{(row.buyerName || "").length > 20 ? "…" : ""}
                          </span>
                          <span style={{ fontSize: 12, color: "#555" }}>{row.buyerRep || ""}</span>
                        </div>
                      </td>
                      <td>
                        {row.quote ? (
                          <span style={{ fontSize: 12, color: "#1a2540", fontWeight: 500 }}>
                            📋 {row.quote.quoteNumber}
                          </span>
                        ) : (
                          <span style={{ fontSize: 12, color: "#aaa" }}>Báo giá đã xóa</span>
                        )}
                      </td>
                      <td>
                        <span className="badge" style={{ background: "#eef0f8", color: "#1a2540" }}>
                          {row.lang === "vi_zh" ? "🇻🇳 VN – 🇨🇳 CN" : "🇻🇳 VN – 🇬🇧 EN"}
                        </span>
                      </td>
                      <td style={{ textAlign: "right", fontWeight: 500 }}>
                        {total > 0 ? fmt(total) + " đ" : <span style={{ color: "#aaa" }}>—</span>}
                      </td>
                      <td style={{ textAlign: "center" }}>
                        <button className="btn btn-primary btn-sm"
                          onClick={() => row.quote && onOpenContract(row.quote)}
                          disabled={!row.quote}
                          title={row.quote ? "Mở hợp đồng" : "Báo giá đã bị xóa"}>
                          📝 Mở
                        </button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}
