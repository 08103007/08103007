  const handleWordClick = async () => {
    setWordLoading(true);
    try { await handleWord(); } catch (e) { alert("Lỗi xuất Word: " + e.message); } finally { setWordLoading(false); }
  };

  const handlePrint = () => {
    const el = document.getElementById("quotePreviewContent");
    if (!el) return;
    const iframe = document.createElement("iframe");
    iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:794px;height:1px;border:none;";
    document.body.appendChild(iframe);
    const iDoc = iframe.contentDocument || iframe.contentWindow.document;
    // Copy all stylesheets
    const styles = Array.from(document.querySelectorAll("style,link[rel='stylesheet']"))
      .map(s => s.outerHTML).join("\n");
    iDoc.open();
    iDoc.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap">
      ${styles}
      <style>
        @page { margin:10mm; size:A4; }
        @page { margin-top:10mm; margin-bottom:10mm; }
        html { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
        body { background:#fff; margin:0; padding:0; }
        .no-print { display:none !important; }
        .quote-preview * { color:#000 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
        .quote-company-header { border-bottom:2px solid #000 !important; }
        .quote-recipient { border:1px solid #000 !important; }
        .quote-items-table { border-collapse:collapse !important; border:1px solid #000 !important; }
        .quote-items-table th, .quote-items-table td { border-right:1px solid #000 !important; border-bottom:1px solid #000 !important; }
        .quote-items-table th:last-child, .quote-items-table td:last-child { border-right:none !important; }
        .quote-items-table tr:last-child td { border-bottom:none !important; }
      </style>
    </head><body>${el.outerHTML}</body></html>`);
    iDoc.close();
    iframe.contentWindow.focus();
    setTimeout(() => {
      iframe.contentWindow.print();
      setTimeout(() => document.body.removeChild(iframe), 1000);
    }, 500);
  };

  const handlePDF = async () => {
    const previewEl = document.getElementById("quotePreviewContent");
    if (!previewEl) return;

    // Render at exactly A4 width (794px) × 3x scale ≈ 230dpi — sharp text, modest file size
    const SCALE = 3;
    const A4_PX = 794;
    const PAD   = 36;  // ~9.5mm padding in px

    const save = {
      width:    previewEl.style.width,
      maxWidth: previewEl.style.maxWidth,
      padding:  previewEl.style.padding,
      margin:   previewEl.style.margin,
      bg:       previewEl.style.background,
    };

    previewEl.style.width    = A4_PX + "px";
    previewEl.style.maxWidth = A4_PX + "px";
    previewEl.style.padding  = PAD + "px";
    previewEl.style.margin   = "0";
    previewEl.style.background = "#ffffff";

    // Collect "do not cut here" ranges from block elements, in px relative to previewEl's top
    const noCutRanges = [];
    previewEl.querySelectorAll("p, h1, h2, h3, h4, h5, h6, table, tr, ul, ol, blockquote, section, header, footer").forEach(el => {
      const r = el.getBoundingClientRect();
      const p = previewEl.getBoundingClientRect();
      noCutRanges.push({ top: r.top - p.top, bottom: r.bottom - p.top });
    });

    try {
      const canvas = await window.html2canvas(previewEl, {
        scale:           SCALE,
        useCORS:         true,
        allowTaint:      true,
        backgroundColor: "#ffffff",
        logging:         false,
        width:           A4_PX,
        height:          previewEl.scrollHeight,
        windowWidth:     A4_PX,
        imageTimeout:    0,
      });

      const { jsPDF } = window.jspdf;
      const PAGE_W = 210, PAGE_H = 297, MARGIN = 10;
      const printW = PAGE_W - MARGIN * 2;   // 190 mm
      const printH = PAGE_H - MARGIN * 2;   // 277 mm

      // Real pixel dimensions (pre-scale)
      const realW = canvas.width  / SCALE;
      const realH = canvas.height / SCALE;

      const mmPerPx  = printW / realW;          // mm per real px
      const pxPerPage = printH / mmPerPx;       // real px per page

      const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

      let srcY = 0, page = 0;
      while (srcY < realH) {
        if (page > 0) doc.addPage();

        let slicePx = Math.min(pxPerPage, realH - srcY);
        let pageEndY = srcY + slicePx;

        // If this boundary falls inside a table row (and it's not the final slice), pull back to before that row
        if (pageEndY < realH) {
          for (const rng of noCutRanges) {
            if (pageEndY > rng.top + 0.5 && pageEndY < rng.bottom - 0.5) {
              const adjusted = rng.top - srcY;
              if (adjusted > 0) slicePx = adjusted;
              break;
            }
          }
        }
        pageEndY = srcY + slicePx;
        const sliceMm = slicePx * mmPerPx;

        const slice = document.createElement("canvas");
        slice.width  = canvas.width;
        slice.height = Math.ceil(slicePx * SCALE);
        const ctx = slice.getContext("2d");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, slice.width, slice.height);
        ctx.drawImage(
          canvas,
          0, Math.floor(srcY * SCALE), canvas.width, Math.ceil(slicePx * SCALE),
          0, 0, slice.width, slice.height
        );

        // JPEG 92% — great quality, far smaller than PNG
        doc.addImage(slice.toDataURL("image/jpeg", 0.92), "JPEG",
                     MARGIN, MARGIN, printW, sliceMm);

        srcY += slicePx;
        page++;
      }

      doc.save("BaoGia_" + quote.quoteNumber + ".pdf");
    } finally {
      previewEl.style.width    = save.width;
      previewEl.style.maxWidth = save.maxWidth;
      previewEl.style.padding  = save.padding;
      previewEl.style.margin   = save.margin;
      previewEl.style.background = save.bg;
    }
  };

  const handlePDFClick = async () => {
    setPdfLoading(true);
    try { await handlePDF(); } finally { setPdfLoading(false); }
  };

  const handleExcel = () => {
    const wb = XLSX.utils.book_new();

    // Sheet 1: Báo giá
    const { subtotal: st, vat: v, total: t } = calcItems(quote.items, quote.vatRate);
    const excelData = [
      [COMPANY.name],
      ["MST: " + COMPANY.mst + " | ĐT: " + COMPANY.phone + " | Email: " + COMPANY.email],
      [COMPANY.address],
      [],
      ["BẢNG BÁO GIÁ"],
      ["Số BG: " + quote.quoteNumber, "", "", "", "", "", "Ngày: " + quote.date],
      ["Kính gửi: " + quote.customer + (quote.contact ? " | Liên hệ: " + quote.contact : "")],
      ...(quote.workContent ? [["Nội dung công việc: " + quote.workContent]] : []),
      [],
      ["STT","Tên hàng hóa / Dịch vụ","Ghi chú","SL","ĐVT","Đơn giá","VAT (%)","Thành tiền (gồm VAT)"],
    ];

    quote.items.forEach((it, i) => {
      const line = (it.qty||0)*(it.price||0);
      const iRate = it.vatRate !== undefined ? it.vatRate : (quote.vatRate !== undefined ? quote.vatRate : 8);
      const vatAmt = iRate === -1 ? 0 : Math.round(line * (iRate||0) / 100);
      const iLabel = iRate === -1 ? "KCT" : (iRate||0)+"%";
      excelData.push([i+1, it.name, it.note||"", it.qty, it.unit, it.price, iLabel, line + vatAmt]);
    });

    excelData.push([]);
    excelData.push(["","","","","","","Tiền hàng (chưa VAT):", st]);
    excelData.push(["","","","","","","VAT (theo từng mặt hàng):", v]);
    excelData.push(["","","","","","","TỔNG CỘNG (gồm VAT):", t]);
    excelData.push([]);
    if (quote.notes) {
      excelData.push(["Ghi chú / Điều khoản:"]);
      quote.notes.split("\n").forEach(ln => {
        if (ln.trim()) excelData.push(["• " + ln.trim()]);
      });
    }

    const ws = XLSX.utils.aoa_to_sheet(excelData);

    // Column widths
    ws["!cols"] = [
      {wch:5}, {wch:45}, {wch:25}, {wch:6}, {wch:8}, {wch:14}, {wch:8}, {wch:16}
    ];

    XLSX.utils.book_append_sheet(wb, ws, "Báo giá");
    XLSX.writeFile(wb, "BaoGia_" + quote.quoteNumber + ".xlsx");
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:860}}>
        <div className="modal-header no-print">
          <span className="modal-title">Xem & In báo giá – {quote.quoteNumber}</span>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body" id="printArea" style={{padding:"12px 12px"}}>
          <div className="quote-preview" id="quotePreviewContent">
            <div className="quote-company-header">
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <img src={getLogoUrl()} className="company-logo-img" alt="PMC Logo" />
                <div className="company-info">
                  <h2>{COMPANY.name}</h2>
                  <p>MST: {COMPANY.mst}</p>
                  <p>Địa chỉ: {COMPANY.address}</p>
                  <p>ĐT: {COMPANY.phone} | Email: {COMPANY.email}</p>
                </div>
              </div>
            </div>
            <div className="quote-title-block">
              <h1>BẢNG BÁO GIÁ</h1>
              <div className="quote-num">Số: {quote.quoteNumber}</div>
            </div>
            <div className="quote-recipient">
              <strong>Kính gửi:</strong> {quote.customer}
              {quote.contact && <span style={{marginLeft:16}}>Người liên hệ: {quote.contact}</span>}
              {quote.workContent && <div style={{marginTop:6,color:"#333"}}><strong>Nội dung:</strong> {quote.workContent}</div>}
            </div>
            {hasImages ? (
              /* ── Bảng CÓ ảnh: giữ nguyên layout cũ ── */
              <table className="quote-items-table">
                <colgroup>
                  <col style={{width:"4%"}} />
                  <col style={{width:"11%"}} />
                  <col />
                  <col style={{width:"4%"}} />
                  <col style={{width:"6%"}} />
                  <col style={{width:"12%"}} />
                  <col style={{width:"6%"}} />
                  <col style={{width:"12%"}} />
                </colgroup>
                <thead>
                  <tr>
                    <th style={{textAlign:"center"}}>STT</th>
                    <th style={{textAlign:"center"}}>HÌNH</th>
                    <th>HÀNG HÓA / DỊCH VỤ</th>
                    <th style={{textAlign:"center"}}>SL</th>
                    <th style={{textAlign:"center"}}>ĐVT</th>
                    <th style={{textAlign:"right"}}>ĐƠN GIÁ</th>
                    <th style={{textAlign:"center"}}>VAT (%)</th>
                    <th style={{textAlign:"right"}}>THÀNH TIỀN</th>
                  </tr>
                </thead>
                <tbody>
                  {quote.items.map((it,i)=>{
                    const line=(it.qty||0)*(it.price||0);
                    const iRate = it.vatRate !== undefined ? it.vatRate : (quote.vatRate !== undefined ? quote.vatRate : 8);
                    const vatAmt = iRate===-1 ? 0 : Math.round(line*(iRate||0)/100);
                    const iLabel = iRate===-1 ? "KCT" : (iRate||0)+"%";
                    return (
                      <tr key={it.id}>
                        <td style={{textAlign:"center"}}>{i+1}</td>
                         <td style={{textAlign:"center",verticalAlign:"middle",padding:"8px 4px"}}>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"center",width:"100%",height:"100%",minHeight:56}}>
                            {it.image && <img src={it.image} alt="" style={{width:"100%",height:"100%",maxWidth:96,maxHeight:96,objectFit:"contain",borderRadius:4,border:"1px solid #e5e3dc",backgroundColor:"#fafafb"}} />}
                          </div>
                        </td>
                        <td style={{whiteSpace:"normal",wordBreak:"break-word"}}>
                          <div style={{whiteSpace:"normal",wordBreak:"break-word"}}>{it.name}</div>
                          {it.note && <div className="item-note-preview" style={{whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{it.note}</div>}
                        </td>
                        <td style={{textAlign:"center"}}>{it.qty}</td>
                        <td style={{textAlign:"center"}}>{it.unit}</td>
                        <td className="right">{fmt(it.price)}</td>
						<td style={{textAlign:"center",fontSize:11,fontWeight:600}}>{iLabel}</td>
                        <td className="right" style={{fontWeight:600}}>{fmt(line+vatAmt)}</td>
                      </tr>
                    );
                  })}
                  <tr className="quote-total-row">
                    <td colSpan={7} style={{textAlign:"right",fontWeight:600}}>TỔNG CỘNG:</td>
                    <td style={{textAlign:"right",fontWeight:700,color:"#1a2540",whiteSpace:"nowrap"}}>{fmt(total)}</td>
                  </tr>
                </tbody>
              </table>
            ) : (
              /* ── Bảng KHÔNG ảnh: colgroup tính chính xác, cột tên hàng tự fill ── */
              <table style={{
                width:"100%", borderCollapse:"collapse", marginBottom:12,
                fontSize:11, border:"1px solid #333", tableLayout:"fixed"
              }}>
                <colgroup>
                  <col style={{width:32}} />
                  <col />
                  <col style={{width:26}} />
                  <col style={{width:42}} />
                  <col style={{width:80}} />
                  <col style={{width:58}} />
                  <col style={{width:84}} />
                </colgroup>
                <thead>
                  <tr>
                    {[
                      ["STT","center"],
                      ["HÀNG HÓA / DỊCH VỤ","left"],
                      ["SL","center"],
                      ["ĐVT","center"],
                      ["ĐƠN GIÁ","right"],
                      ["VAT","center"],
                      ["THÀNH TIỀN","right"],
                    ].map(([label,align],idx)=>(
                      <th key={label} style={{
                        background:"transparent", color:"#1a2540", padding:"7px 4px",
                        fontWeight:600, textAlign:align,
                        borderRight: idx===6 ? "none" : "1px solid #333",
                        borderBottom:"1px solid #333",
                        overflow:"hidden", whiteSpace: label==="HÀNG HÓA / DỊCH VỤ" ? "normal" : "nowrap"
                      }}>{label}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {quote.items.map((it,i)=>{
                    const line=(it.qty||0)*(it.price||0);
                    const iRate = it.vatRate !== undefined ? it.vatRate : (quote.vatRate !== undefined ? quote.vatRate : 8);
                    const vatAmt = iRate===-1 ? 0 : Math.round(line*(iRate||0)/100);
                    const iLabel = iRate===-1 ? "KCT" : (iRate||0)+"%";
                    const td = (content, align="left", extra={}, isLast=false) => (
                      <td style={{
                        padding:"6px 5px",
                        borderRight: isLast ? "none" : "1px solid #333",
                        borderBottom:"1px solid #333", textAlign:align,
                        verticalAlign:"top", overflow:"hidden",
                        wordBreak: align==="left" ? "break-word" : "normal",
                        whiteSpace: align==="left" ? "normal" : "nowrap",
                        ...extra
                      }}>{content}</td>
                    );
                    return (
                      <tr key={it.id}>

                          <><div style={{fontWeight:500}}>{it.name}</div>

                          "left"
                        )}

                        {td(it.unit,"center")}
                        {td(fmt(it.price),"right")}
                        {td(<span style={{fontWeight:600}}>{iLabel}</span>, "center")}
                        {td(fmt(line+vatAmt),"right",{fontWeight:600},true)}
                      </tr>
                    );
                  })}
                  <tr>
                    <td colSpan={6} style={{
                      textAlign:"right", fontWeight:700, padding:"8px 5px",
                      borderRight:"1px solid #333", fontSize:12
                    }}>TỔNG CỘNG:</td>
                    <td style={{
                      textAlign:"right", fontWeight:700, color:"#1a2540",
                      padding:"8px 5px", fontSize:12, whiteSpace:"nowrap",
                      borderRight:"none"
                    }}>{fmt(total)}</td>
                  </tr>
                </tbody>
              </table>
            )}
            <div className="quote-footer">
              <div className="quote-notes">
                <ul>
                  {(quote.notes||"").split("\n").filter(l=>l.trim()).map((l,i)=><li key={i}>{l.trim()}</li>)}
                </ul>
              </div>
              <div className="quote-sign">
                <div className="location-date">Phú Mỹ, ngày {String(today.getDate()).padStart(2,"0")} tháng {String(today.getMonth()+1).padStart(2,"0")} năm {today.getFullYear()}</div>
                <div className="company-name">{COMPANY.short}</div>
              </div>
            </div>
          </div>
        </div>
        <div className="modal-footer no-print">
          <button className="btn btn-ghost" onClick={onClose}>Đóng</button>
          <button className="btn btn-excel" onClick={handleExcel}>📊 Xuất Excel</button>
          <button className="btn btn-ghost" onClick={handlePDFClick} disabled={pdfLoading} style={{minWidth:110}}>
            {pdfLoading ? "⏳ Đang tạo..." : "📄 Xuất PDF"}
          </button>
          <button className="btn btn-ghost" onClick={handleWordClick} disabled={wordLoading} style={{minWidth:110}}>
            {wordLoading ? "⏳ Đang tạo..." : "📝 Xuất Word"}
          </button>
          {onCreateContract && (
            <button className="btn btn-ghost" onClick={()=>onCreateContract(quote)}>📃 Soạn hợp đồng</button>
          )}
          {onHandover && (
            <button className="btn btn-ghost" onClick={()=>onHandover(quote)}>📋 Biên bản BG</button>
          )}
          {onDelivery && (
            <button className="btn btn-ghost" onClick={()=>onDelivery(quote)}>🚚 Phiếu giao hàng</button>
          )}
          <button className="btn btn-primary" onClick={handlePrint}>🖨️ In</button>
        </div>
      </div>
    </div>
  );
}

// ─── HandoverModal: Soạn & in biên bản bàn giao ─────────────────────────────
// Props: quote (null = tạo biên bản trắng), onClose
function HandoverModal({ quote, onClose }) {
  const today = new Date();
  const todayFull = `${String(today.getDate()).padStart(2,"0")} tháng ${String(today.getMonth()+1).padStart(2,"0")} năm ${today.getFullYear()}`;

  const [receiverName, setReceiverName] = React.useState("");
  const [receiverCompany, setReceiverCompany] = React.useState(quote ? quote.customer : "");
  const [receiverTitle, setReceiverTitle] = React.useState("");
  const [delivererName, setDelivererName] = React.useState("Trần Văn Thịnh");
  const [workContent, setWorkContent] = React.useState(quote ? (quote.workContent || "") : "");
  const [evaluation, setEvaluation] = React.useState("Tốt");
  const [dateStr, setDateStr] = React.useState(todayFull);
  const [refNum, setRefNum] = React.useState(quote ? ("BBBG-" + (quote.quoteNumber || generateId().slice(0,6).toUpperCase())) : "");
  const [pdfLoading, setPdfLoading] = React.useState(false);
  const [saving, setSaving]         = React.useState(false);
  const [saveMsg, setSaveMsg]       = React.useState("");

  // Key lưu: nếu có quote thì dùng id báo giá, nếu tạo mới độc lập thì dùng refNum
  const storageId = quote ? ("hw_" + quote.id) : null;

  // Use quote items if quote provided, else allow custom items
  const [items, setItems] = React.useState(() => {
    if (!quote) return [{ id: generateId(), name: "", qty: 1, unit: "Cái" }];
    return quote.items.map(it => ({ id: it.id, name: it.name, qty: it.qty, unit: it.unit }));
  });

  const addItem = () => setItems(prev => [...prev, { id: generateId(), name: "", qty: 1, unit: "Cái" }]);
  const removeItem = (id) => setItems(prev => prev.filter(it => it.id !== id));
  const setItemField = (id, field, val) => setItems(prev => prev.map(it => it.id === id ? { ...it, [field]: val } : it));

  // Load biên bản đã lưu trước (nếu có)
  React.useEffect(() => {
    if (!storageId) return;
    loadHandover(storageId).then(saved => {
      if (!saved) return;
      if (saved.receiverName)    setReceiverName(saved.receiverName);
      if (saved.receiverCompany) setReceiverCompany(saved.receiverCompany);
      if (saved.receiverTitle)   setReceiverTitle(saved.receiverTitle);
      if (saved.delivererName)   setDelivererName(saved.delivererName);
      if (saved.workContent)     setWorkContent(saved.workContent);
      if (saved.evaluation)      setEvaluation(saved.evaluation);
      if (saved.dateStr)         setDateStr(saved.dateStr);
      if (saved.refNum)          setRefNum(saved.refNum);
      if (saved.items && saved.items.length) setItems(saved.items);
    }).catch(() => {});
  }, []);

  const handleSave = async () => {
    if (!storageId) { showToast("⚠️ Cần gắn biên bản vào một báo giá để lưu", 2500); return; }
    setSaving(true);
    try {
      await saveHandover(storageId, { receiverName, receiverCompany, receiverTitle, delivererName, workContent, evaluation, dateStr, refNum, items });
      setSaveMsg("✓ Đã lưu");
      setTimeout(() => setSaveMsg(""), 2000);
    } finally { setSaving(false); }
  };

  const handlePrint = () => {
    const el = document.getElementById("handoverPreviewContent");
    if (!el) return;
    const iframe = document.createElement("iframe");
    iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:794px;height:1px;border:none;";
    document.body.appendChild(iframe);
    const iDoc = iframe.contentDocument || iframe.contentWindow.document;
    const styles = Array.from(document.querySelectorAll("style,link[rel='stylesheet']"))
      .map(s => s.outerHTML).join("\n");
    iDoc.open();
    iDoc.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap">
      ${styles}
      <style>
        @page { margin:10mm; size:A4; }
        @page { margin-top:10mm; margin-bottom:10mm; }
        html { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
        body { background:#fff; margin:0; padding:0; }
        .no-print { display:none !important; }
        .handover-preview * { color:#000 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
        .handover-items-table { border:1px solid #000 !important; border-collapse:collapse !important; }
        .handover-items-table th, .handover-items-table td { border-right:1px solid #000 !important; border-bottom:1px solid #000 !important; }
        .handover-items-table th:last-child, .handover-items-table td:last-child { border-right:none !important; }
        .handover-items-table tr:last-child td { border-bottom:none !important; }
        .handover-header-table td:first-child { border-right:2px solid #000 !important; }
      </style>
    </head><body>${el.outerHTML}</body></html>`);
    iDoc.close();
    iframe.contentWindow.focus();
    setTimeout(() => {
      iframe.contentWindow.print();
      setTimeout(() => document.body.removeChild(iframe), 1000);
    }, 500);
  };

  const handlePDF = async () => {
    const el = document.getElementById("handoverPreviewContent");
    if (!el) return;
    const SCALE = 3, A4_PX = 794, PAD = 36;
    const save = { width: el.style.width, maxWidth: el.style.maxWidth, padding: el.style.padding, margin: el.style.margin, bg: el.style.background };
    el.style.width = A4_PX + "px"; el.style.maxWidth = A4_PX + "px"; el.style.padding = PAD + "px"; el.style.margin = "0"; el.style.background = "#ffffff";
    try {
      const canvas = await window.html2canvas(el, { scale: SCALE, useCORS: true, allowTaint: true, backgroundColor: "#ffffff", logging: false, width: A4_PX, height: el.scrollHeight, windowWidth: A4_PX, imageTimeout: 0 });
      const { jsPDF } = window.jspdf;
      const PAGE_W = 210, PAGE_H = 297, MARGIN = 10;
      const printW = PAGE_W - MARGIN * 2, printH = PAGE_H - MARGIN * 2;
      const realW = canvas.width / SCALE, realH = canvas.height / SCALE;
      const mmPerPx = printW / realW, pxPerPage = printH / mmPerPx;
      const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
      let srcY = 0, page = 0;
      while (srcY < realH) {
        if (page > 0) doc.addPage();
        const slicePx = Math.min(pxPerPage, realH - srcY);
        const sliceMm = slicePx * mmPerPx;
        const slice = document.createElement("canvas");
        slice.width = canvas.width; slice.height = Math.ceil(slicePx * SCALE);
        const ctx = slice.getContext("2d");
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, slice.width, slice.height);
        ctx.drawImage(canvas, 0, Math.floor(srcY * SCALE), canvas.width, Math.ceil(slicePx * SCALE), 0, 0, slice.width, slice.height);
        doc.addImage(slice.toDataURL("image/jpeg", 0.92), "JPEG", MARGIN, MARGIN, printW, sliceMm);
        srcY += slicePx; page++;
      }
      doc.save("BienBan_" + refNum + ".pdf");
    } finally {
      el.style.width = save.width; el.style.maxWidth = save.maxWidth; el.style.padding = save.padding; el.style.margin = save.margin; el.style.background = save.bg;
    }
  };

  const handlePDFClick = async () => { setPdfLoading(true); try { await handlePDF(); } finally { setPdfLoading(false); } };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ maxWidth: 980 }}>
        <div className="modal-header no-print">
          <span className="modal-title">📋 Biên bản bàn giao & nghiệm thu</span>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body" style={{ display: "flex", gap: 20 }}>
          {/* Left: Form */}
          <div className="no-print hw-form-col" style={{ width: 320, flexShrink: 0, borderRight: "1px solid #e5e3dc", paddingRight: 20 }}>
            <div className="hw-form-section">
              <h4>Thông tin biên bản</h4>
              <div className="form-group">
                <label>Số biên bản</label>
                <input className="form-control" value={refNum} onChange={e => setRefNum(e.target.value)} />
              </div>
              <div className="form-group">
                <label>Ngày lập</label>
                <input className="form-control" value={dateStr} onChange={e => setDateStr(e.target.value)} />
              </div>
            </div>
            <div className="hw-form-section">
              <h4>Bên giao</h4>
              <div className="form-group">
                <label>Người đại diện</label>
                <input className="form-control" value={delivererName} onChange={e => setDelivererName(e.target.value)} />
              </div>
            </div>
            <div className="hw-form-section">
              <h4>Bên nhận</h4>
              <div className="form-group">
                <label>Ông/Bà</label>
                <input className="form-control" placeholder="Họ tên người nhận" value={receiverName} onChange={e => setReceiverName(e.target.value)} />
              </div>
              <div className="form-group">
                <label>Chức vụ</label>
                <input className="form-control" placeholder="Chức vụ (nếu có)" value={receiverTitle} onChange={e => setReceiverTitle(e.target.value)} />
              </div>
              <div className="form-group">
                <label>Đại diện đơn vị</label>
                <input className="form-control" value={receiverCompany} onChange={e => setReceiverCompany(e.target.value)} />
              </div>
            </div>
            <div className="hw-form-section">
              <h4>Nội dung công việc</h4>
              <div className="form-group">
                <textarea className="form-control" rows={3} placeholder="Mô tả nội dung công việc..." value={workContent} onChange={e => setWorkContent(e.target.value)} />
              </div>
            </div>
            <div className="hw-form-section">
              <h4>Danh mục thiết bị & dịch vụ</h4>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                <thead>
                  <tr>
                    <th style={{ textAlign: "left", padding: "4px 4px", fontWeight: 600, color: "#666", borderBottom: "1px solid #e5e3dc" }}>Tên hàng hóa</th>
                    <th style={{ width: 45, textAlign: "center", padding: "4px", borderBottom: "1px solid #e5e3dc", fontWeight: 600, color: "#666" }}>SL</th>
                    <th style={{ width: 50, textAlign: "center", padding: "4px", borderBottom: "1px solid #e5e3dc", fontWeight: 600, color: "#666" }}>ĐVT</th>
                    <th style={{ width: 24, borderBottom: "1px solid #e5e3dc" }}></th>
                  </tr>
                </thead>
                <tbody>
                  {items.map((it, i) => (
                    <tr key={it.id}>

                        </div>
                      </div>
                    </td>
                    <td>
                      <div style={{ fontWeight: 700, fontSize: 12 }}>CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</div>
                      <div style={{ fontWeight: 600, fontSize: 12 }}>Độc lập – Tự do – Hạnh phúc</div>
                      <div style={{ fontSize: 11, marginTop: 4 }}>⸻⸻⸻</div>

                <p style={{ marginLeft: 20 }}>Đại diện: <strong>{COMPANY.name}</strong></p>

                <p style={{ marginTop: 10 }}><strong>BÊN NHẬN:</strong></p>
                <p style={{ marginLeft: 20 }}>Ông/Bà: <strong>{receiverName || "……………………………………"}</strong>{receiverTitle ? ` – ${receiverTitle}` : ""}</p>
                <p style={{ marginLeft: 20 }}>Đại diện: <strong>{receiverCompany || "……………………………………………………………"}</strong></p>

                {workContent && (

                        <td>{it.name}</td>
                        <td style={{ textAlign: "center" }}>{it.qty}</td>
                        <td style={{ textAlign: "center" }}>{it.unit}</td>

                </table>

                <p>– Đánh giá: <strong>{evaluation}</strong>.</p>

                <p style={{ marginTop: 12 }}>
                  Hai bên thống nhất lập Biên bản bàn giao và nghiệm thu theo những nội dung như trên và được lập thành 02 bản giống nhau, mỗi bên giữ một bản có giá trị tương đương nhau.
                </p>
              </div>

              {/* Signatures */}
              <div className="handover-sign">
                <div className="handover-sign-block">
                  <div className="sign-title">BÊN GIAO</div>
                  <div className="sign-name">(Ký và ghi rõ họ tên)</div>
                  <div className="sign-space" />
                  <div style={{ fontWeight: 600 }}>{delivererName}</div>
                  <div className="sign-name">{COMPANY.short}</div>
                </div>
                <div className="handover-sign-block">
                  <div className="sign-title">BÊN NHẬN</div>
                  <div className="sign-name">(Ký và ghi rõ họ tên)</div>
                  <div className="sign-space" />
                  {/* Tên: nếu chưa điền → gạch dưới để ký tay */}
                  <div style={{ fontWeight:600, borderBottom: receiverName ? "none" : "1px solid #333", minWidth:160, display:"inline-block", minHeight:18 }}>
                    {receiverName || ""}
                  </div>
                  <div className="sign-name" style={{ marginTop:3 }}>
                    {receiverCompany || ""}

            </div>
          </div>
        </div>

        <div className="modal-footer no-print">

}

// ─── DeliveryModal: Soạn & in phiếu giao hàng ───────────────────────────────
// Props: quote (null = phiếu trắng), onClose
function DeliveryModal({ quote, onClose }) {
  const today = new Date();
  const todayFull = `ngày ${String(today.getDate()).padStart(2,"0")} tháng ${String(today.getMonth()+1).padStart(2,"0")} năm ${today.getFullYear()}`;

  const [refNum,        setRefNum]        = React.useState(() => "PGH-" + (quote?.quoteNumber || generateId().slice(0,6).toUpperCase()));
  const [dateStr,       setDateStr]       = React.useState(todayFull);
  const [delivererName, setDelivererName] = React.useState("Trần Văn Thịnh");
  const [delivererPhone,setDelivererPhone]= React.useState(COMPANY.phone);
  const [receiverName,  setReceiverName]  = React.useState("");
  const [receiverPhone, setReceiverPhone] = React.useState(quote?.phone || "");
  const [receiverCompany,setReceiverCompany]=React.useState(quote?.customer || "");
  const [deliveryAddress,setDeliveryAddress]=React.useState(quote?.address || "");
  const [note,          setNote]          = React.useState("");
  const [pdfLoading,    setPdfLoading]    = React.useState(false);
  const [saving,        setSaving]        = React.useState(false);
  const [saveMsg,       setSaveMsg]       = React.useState("");

  const storageId = quote ? ("dv_" + quote.id) : null;

  // Load phiếu đã lưu trước (nếu có)
  React.useEffect(() => {
    if (!storageId) return;
    loadDelivery(storageId).then(saved => {
      if (!saved) return;
      if (saved.refNum)          setRefNum(saved.refNum);
      if (saved.dateStr)         setDateStr(saved.dateStr);
      if (saved.delivererName)   setDelivererName(saved.delivererName);
      if (saved.delivererPhone)  setDelivererPhone(saved.delivererPhone);
      if (saved.receiverName)    setReceiverName(saved.receiverName);
      if (saved.receiverPhone)   setReceiverPhone(saved.receiverPhone);
      if (saved.receiverCompany) setReceiverCompany(saved.receiverCompany);
      if (saved.deliveryAddress) setDeliveryAddress(saved.deliveryAddress);
      if (saved.note)            setNote(saved.note);
      if (saved.items && saved.items.length) setItems(saved.items);
    }).catch(() => {});
  }, []);

  const handleSave = async () => {
    if (!storageId) { showToast("⚠️ Cần gắn phiếu vào một báo giá để lưu", 2500); return; }
    setSaving(true);
    try {
      await saveDelivery(storageId, { refNum, dateStr, delivererName, delivererPhone, receiverName, receiverPhone, receiverCompany, deliveryAddress, note, items });
      setSaveMsg("✓ Đã lưu");
      setTimeout(() => setSaveMsg(""), 2000);
    } finally { setSaving(false); }
  };

  // Bảng hàng hóa – lấy từ báo giá nếu có, thêm cột serial
  const [items, setItems] = React.useState(() => {
    if (!quote) return [{ id: generateId(), name: "", qty: 1, unit: "Cái", serial: "" }];
    return quote.items.map(it => ({ id: it.id, name: it.name, qty: it.qty, unit: it.unit, serial: "" }));
  });

  const addItem    = () => setItems(p => [...p, { id: generateId(), name: "", qty: 1, unit: "Cái", serial: "" }]);
  const removeItem = id  => setItems(p => p.filter(it => it.id !== id));
  const setField   = (id, f, v) => setItems(p => p.map(it => it.id === id ? { ...it, [f]: v } : it));

  // ── In / PDF (dùng lại pattern HandoverModal) ────────────────────────────
  const handlePrint = () => {
    const el = document.getElementById("deliveryPreviewContent");
    if (!el) return;
    const iframe = document.createElement("iframe");
    iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:794px;height:1px;border:none;";
    document.body.appendChild(iframe);
    const iDoc = iframe.contentDocument || iframe.contentWindow.document;
    const styles = Array.from(document.querySelectorAll("style,link[rel='stylesheet']")).map(s => s.outerHTML).join("\n");
    iDoc.open();
    iDoc.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap">
      ${styles}
      <style>
        @page { margin:10mm; size:A4; }
        html { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
        body { background:#fff; margin:0; padding:0; }
        .no-print { display:none !important; }
        .handover-items-table { border:1px solid #000 !important; border-collapse:collapse !important; }
        .handover-items-table th, .handover-items-table td { border-right:1px solid #000 !important; border-bottom:1px solid #000 !important; color:#000 !important; }
        .handover-items-table th:last-child, .handover-items-table td:last-child { border-right:none !important; }
        .handover-items-table tr:last-child td { border-bottom:none !important; }
      </style>
    </head><body>${el.outerHTML}</body></html>`);
    iDoc.close();
    iframe.contentWindow.focus();
    setTimeout(() => { iframe.contentWindow.print(); setTimeout(() => document.body.removeChild(iframe), 1000); }, 500);
  };

  const handlePDF = async () => {
    const el = document.getElementById("deliveryPreviewContent");
    if (!el) return;
    const SCALE = 3, A4_PX = 794, PAD = 36;
    const save = { width: el.style.width, maxWidth: el.style.maxWidth, padding: el.style.padding, margin: el.style.margin, bg: el.style.background };
    el.style.width = A4_PX + "px"; el.style.maxWidth = A4_PX + "px";
    el.style.padding = PAD + "px"; el.style.margin = "0"; el.style.background = "#ffffff";
    try {
      const canvas = await window.html2canvas(el, { scale: SCALE, useCORS: true, allowTaint: true, backgroundColor: "#ffffff", logging: false, width: A4_PX, height: el.scrollHeight, windowWidth: A4_PX, imageTimeout: 0 });
      const { jsPDF } = window.jspdf;
      const PAGE_W = 210, PAGE_H = 297, MARGIN = 10;
      const printW = PAGE_W - MARGIN * 2, printH = PAGE_H - MARGIN * 2;
      const realW = canvas.width / SCALE, realH = canvas.height / SCALE;
      const mmPerPx = printW / realW, pxPerPage = printH / mmPerPx;
      const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
      let srcY = 0, page = 0;
      while (srcY < realH) {
        if (page > 0) doc.addPage();
        const slicePx = Math.min(pxPerPage, realH - srcY), sliceMm = slicePx * mmPerPx;
        const slice = document.createElement("canvas");
        slice.width = canvas.width; slice.height = Math.ceil(slicePx * SCALE);
        const ctx = slice.getContext("2d");
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, slice.width, slice.height);
        ctx.drawImage(canvas, 0, Math.floor(srcY * SCALE), canvas.width, Math.ceil(slicePx * SCALE), 0, 0, slice.width, slice.height);
        doc.addImage(slice.toDataURL("image/jpeg", 0.92), "JPEG", MARGIN, MARGIN, printW, sliceMm);
        srcY += slicePx; page++;
      }
      doc.save("PhieuGiaoHang_" + refNum + ".pdf");
    } finally {
      el.style.width = save.width; el.style.maxWidth = save.maxWidth;
      el.style.padding = save.padding; el.style.margin = save.margin; el.style.background = save.bg;
    }
  };

  const handlePDFClick = async () => { setPdfLoading(true); try { await handlePDF(); } finally { setPdfLoading(false); } };

  // ── Render ────────────────────────────────────────────────────────────────
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ maxWidth: 1000 }}>
        <div className="modal-header no-print">
          <span className="modal-title">🚚 Phiếu giao hàng</span>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>

        <div className="modal-body" style={{ display: "flex", gap: 20 }}>

          {/* ── Cột trái: Form nhập ── */}
          <div className="no-print hw-form-col" style={{ width: 300, flexShrink: 0, borderRight: "1px solid #e5e3dc", paddingRight: 20, overflowY: "auto" }}>

            <div className="hw-form-section">
              <h4>Thông tin phiếu</h4>
              <div className="form-group">
                <label>Số phiếu</label>
                <input className="form-control" value={refNum} onChange={e => setRefNum(e.target.value)} />
              </div>
              <div className="form-group">
                <label>Ngày lập</label>
                <input className="form-control" value={dateStr} onChange={e => setDateStr(e.target.value)} />
              </div>
            </div>

            <div className="hw-form-section">
              <h4>Bên giao</h4>
              <div className="form-group">
                <label>Người giao hàng</label>
                <input className="form-control" value={delivererName} onChange={e => setDelivererName(e.target.value)} />
              </div>
              <div className="form-group">
                <label>Điện thoại</label>
                <input className="form-control" value={delivererPhone} onChange={e => setDelivererPhone(e.target.value)} />
              </div>
            </div>

            <div className="hw-form-section">
              <h4>Bên nhận</h4>
              <div className="form-group">
                <label>Người nhận</label>
                <input className="form-control" placeholder="Họ tên người nhận" value={receiverName} onChange={e => setReceiverName(e.target.value)} />
              </div>
              <div className="form-group">
                <label>Điện thoại</label>
                <input className="form-control" value={receiverPhone} onChange={e => setReceiverPhone(e.target.value)} />
              </div>
              <div className="form-group">
                <label>Công ty / Đơn vị</label>
                <input className="form-control" value={receiverCompany} onChange={e => setReceiverCompany(e.target.value)} />
              </div>
              <div className="form-group">
                <label>Địa chỉ giao hàng</label>
                <textarea className="form-control" rows={2} value={deliveryAddress} onChange={e => setDeliveryAddress(e.target.value)} />
              </div>
            </div>

            <div className="hw-form-section">
              <h4>Danh sách hàng hóa</h4>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
                <thead>
                  <tr>
                    <th style={{ textAlign:"left", padding:"3px 3px", fontWeight:600, color:"#666", borderBottom:"1px solid #e5e3dc" }}>Tên hàng</th>
                    <th style={{ width:36, textAlign:"center", padding:"3px", borderBottom:"1px solid #e5e3dc", fontWeight:600, color:"#666" }}>SL</th>
                    <th style={{ width:42, textAlign:"center", padding:"3px", borderBottom:"1px solid #e5e3dc", fontWeight:600, color:"#666" }}>ĐVT</th>
                    <th style={{ width:70, textAlign:"center", padding:"3px", borderBottom:"1px solid #e5e3dc", fontWeight:600, color:"#666" }}>Serial/SN</th>
                    <th style={{ width:20, borderBottom:"1px solid #e5e3dc" }}></th>
                  </tr>
                </thead>
                <tbody>
                  {items.map((it, i) => (
                    <tr key={it.id}>
                      <td style={{ padding:"2px 3px" }}>
                        <input style={{ width:"100%", border:"1px solid #d1cfc6", borderRadius:3, padding:"2px 4px", fontSize:11, fontFamily:"inherit" }}
                          value={it.name} onChange={e => setField(it.id, "name", e.target.value)} placeholder={`Hàng ${i+1}`} />
                      </td>
                      <td style={{ padding:"2px 3px" }}>
                        <input type="number" style={{ width:"100%", border:"1px solid #d1cfc6", borderRadius:3, padding:"2px 3px", fontSize:11, textAlign:"center", fontFamily:"inherit" }}
                          value={it.qty} onChange={e => setField(it.id, "qty", e.target.value)} />
                      </td>
                      <td style={{ padding:"2px 3px" }}>
                        <input style={{ width:"100%", border:"1px solid #d1cfc6", borderRadius:3, padding:"2px 3px", fontSize:11, fontFamily:"inherit" }}
                          value={it.unit} onChange={e => setField(it.id, "unit", e.target.value)} />
                      </td>
                      <td style={{ padding:"2px 3px" }}>
                        <input style={{ width:"100%", border:"1px solid #d1cfc6", borderRadius:3, padding:"2px 3px", fontSize:11, fontFamily:"inherit" }}
                          value={it.serial} onChange={e => setField(it.id, "serial", e.target.value)} placeholder="…" />
                      </td>
                      <td style={{ textAlign:"center", padding:"2px 1px" }}>
                        {items.length > 1 && (
                          <button onClick={() => removeItem(it.id)} style={{ background:"none", border:"none", color:"#dc2626", cursor:"pointer", fontSize:14, padding:"1px" }}>×</button>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <button className="btn btn-ghost btn-sm" style={{ marginTop:8 }} onClick={addItem}>+ Thêm dòng</button>
            </div>

            <div className="hw-form-section">
              <h4>Ghi chú</h4>
              <div className="form-group">
                <textarea className="form-control" rows={2} placeholder="Ghi chú thêm (nếu có)..." value={note} onChange={e => setNote(e.target.value)} />
              </div>
            </div>

          </div>

          {/* ── Cột phải: Preview ── */}
          <div style={{ flex:1, overflowY:"auto" }}>
            <div id="deliveryPreviewContent" style={{ fontFamily:"'Plus Jakarta Sans',sans-serif", padding:28, maxWidth:794, margin:"0 auto", background:"#fff", fontSize:13, color:"#000" }}>

              {/* Header: logo + quốc hiệu */}
              <table style={{ width:"100%", borderCollapse:"collapse", marginBottom:14 }}>
                <tbody>
                  <tr>
                    <td style={{ width:"55%", verticalAlign:"top", paddingRight:12, borderRight:"2px solid #1a2540" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                        <img src={getLogoUrl()} style={{ width:48, height:48, objectFit:"contain" }} alt="PMC" />

                          <div style={{ fontSize:10, color:"#555" }}>ĐT: {COMPANY.phone} | Email: {COMPANY.email}</div>
                        </div>
                      </div>
                    </td>
                    <td style={{ textAlign:"center", paddingLeft:12, verticalAlign:"top" }}>
                      <div style={{ fontWeight:700, fontSize:12 }}>CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</div>
                      <div style={{ fontWeight:600, fontSize:12 }}>Độc lập – Tự do – Hạnh phúc</div>
                      <div style={{ fontSize:11, marginTop:4 }}>⸻⸻⸻</div>
                    </td>
                  </tr>
                </tbody>
              </table>

              {/* Tiêu đề */}
              <div style={{ textAlign:"center", margin:"14px 0 18px" }}>
                <div style={{ fontSize:18, fontWeight:700, color:"#1a2540", textTransform:"uppercase", letterSpacing:"0.05em" }}>Phiếu giao hàng</div>
                <div style={{ fontSize:11, color:"#666", marginTop:3 }}>Số: <strong>{refNum}</strong></div>
                <div style={{ fontSize:11, color:"#666" }}>{dateStr}</div>
              </div>

              {/* Thông tin bên giao / bên nhận */}
              <table style={{ width:"100%", borderCollapse:"collapse", marginBottom:14, fontSize:12 }}>
                <tbody>
                  <tr>
                    <td style={{ width:"50%", verticalAlign:"top", paddingRight:16 }}>

                      <div><span style={{ color:"#555", minWidth:90, display:"inline-block" }}>Công ty:</span> <strong>{COMPANY.name}</strong></div>
                      <div><span style={{ color:"#555", minWidth:90, display:"inline-block" }}>Người giao:</span> <strong>{delivererName || "……………………………"}</strong></div>
                      <div><span style={{ color:"#555", minWidth:90, display:"inline-block" }}>Điện thoại:</span> {delivererPhone || "……………………………"}</div>
                    </td>
                    <td style={{ width:"50%", verticalAlign:"top", paddingLeft:16, borderLeft:"1px solid #e5e3dc" }}>
                      <div style={{ fontWeight:700, color:"#1a2540", marginBottom:6, fontSize:12, borderBottom:"1px solid #e5e3dc", paddingBottom:4 }}>BÊN NHẬN HÀNG</div>
                      <div><span style={{ color:"#555", minWidth:90, display:"inline-block" }}>Người nhận:</span> <strong>{receiverName || "……………………………"}</strong></div>
                      <div><span style={{ color:"#555", minWidth:90, display:"inline-block" }}>Điện thoại:</span> {receiverPhone || "……………………………"}</div>
                      {receiverCompany && <div><span style={{ color:"#555", minWidth:90, display:"inline-block" }}>Đơn vị:</span> {receiverCompany}</div>}
                    </td>
                  </tr>
                </tbody>
              </table>

              {/* Địa chỉ giao hàng */}
              {deliveryAddress && (
                <div style={{ marginBottom:14, fontSize:12, background:"#f9f8f5", borderLeft:"3px solid #1a2540", padding:"8px 12px", borderRadius:"0 4px 4px 0" }}>
                  📍 <strong>Địa chỉ giao hàng:</strong> {deliveryAddress}
                </div>
              )}

              {/* Bảng hàng hóa */}
              <table className="handover-items-table" style={{ marginBottom:14 }}>
                <thead>
                  <tr>
                    <th style={{ width:36 }}>STT</th>
                    <th style={{ textAlign:"left" }}>TÊN HÀNG HÓA / DỊCH VỤ</th>
                    <th style={{ width:65 }}>SỐ LƯỢNG</th>
                    <th style={{ width:55 }}>ĐVT</th>
                    <th style={{ width:120 }}>SERIAL / SN</th>
                  </tr>
                </thead>
                <tbody>
                  {items.map((it, i) => (
                    <tr key={it.id}>
                      <td style={{ textAlign:"center" }}>{i+1}</td>
                      <td>{it.name}</td>
                      <td style={{ textAlign:"center" }}>{it.qty}</td>
                      <td style={{ textAlign:"center" }}>{it.unit}</td>
                      <td style={{ textAlign:"center", color: it.serial ? "#000" : "#bbb" }}>{it.serial || "—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>

              {/* Ghi chú */}
              {note && (
                <div style={{ marginBottom:16, fontSize:12, color:"#444" }}>
                  <strong>Ghi chú:</strong> {note}
                </div>
              )}

              {/* Xác nhận giao nhận */}
              <div style={{ marginBottom:16, fontSize:12, lineHeight:1.8 }}>
                Hai bên xác nhận hàng hóa giao nhận đúng số lượng, chủng loại và tình trạng như trên. Phiếu giao hàng được lập thành <strong>02 bản</strong>, mỗi bên giữ <strong>01 bản</strong> có giá trị như nhau.
              </div>

              {/* Chữ ký */}
              <div style={{ display:"flex", justifyContent:"space-between", marginTop:24, fontSize:12 }}>
                <div style={{ textAlign:"center", minWidth:200 }}>
                  <div style={{ fontWeight:700, color:"#1a2540", marginBottom:2 }}>NGƯỜI GIAO HÀNG</div>
                  <div style={{ color:"#666", fontSize:11 }}>(Ký và ghi rõ họ tên)</div>
                  <div style={{ height:60 }} />
                  <div style={{ fontWeight:600 }}>{delivererName}</div>
                  <div style={{ color:"#666", fontSize:11 }}>{COMPANY.short}</div>
                </div>
                <div style={{ textAlign:"center", minWidth:200 }}>
                  <div style={{ fontWeight:700, color:"#1a2540", marginBottom:2 }}>NGƯỜI NHẬN HÀNG</div>
                  <div style={{ color:"#666", fontSize:11 }}>(Ký và ghi rõ họ tên)</div>
                  <div style={{ height:60 }} />
                  {/* Tên: nếu chưa điền → gạch dưới để ký tay */}
                  <div style={{ fontWeight:600, borderBottom: receiverName ? "none" : "1px solid #333", minWidth:160, display:"inline-block", minHeight:18 }}>
                    {receiverName || ""}
                  </div>
                  {/* Công ty: luôn hiển thị bên dưới, nếu chưa có thì để trống */}
                  <div style={{ color:"#666", fontSize:11, marginTop:3 }}>
                    {receiverCompany || ""}
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>

        <div className="modal-footer no-print">
          <button className="btn btn-ghost" onClick={onClose}>Đóng</button>
          {storageId && (
            <button className="btn btn-ghost" onClick={handleSave} disabled={saving}>
              {saving ? "⏳ Đang lưu..." : "💾 Lưu phiếu"}{saveMsg && <span style={{color:"#16a34a",marginLeft:6}}>{saveMsg}</span>}
            </button>
          )}
          <button className="btn btn-ghost" onClick={handlePDFClick} disabled={pdfLoading} style={{ minWidth:110 }}>
            {pdfLoading ? "⏳ Đang tạo..." : "📄 Xuất PDF"}
          </button>
          <button className="btn btn-primary" onClick={handlePrint}>🖨️ In</button>
        </div>
      </div>
    </div>
  );
}
