// TASKS – Quản lý công việc hằng ngày kèm tiến độ
// ═══════════════════════════════════════════════════════════════════════════════
const TASK_STATUSES = ["todo", "doing", "done"];
const TASK_STATUS_LABELS = { todo: "Cần làm", doing: "Đang làm", done: "Xong" };
const TASK_STATUS_COLORS = { todo: "#6b7280", doing: "#2563eb", done: "#16a34a" };
const TASK_PRIORITIES = ["high", "medium", "low"];
const TASK_PRIORITY_LABELS = { high: "Khẩn", medium: "Bình thường", low: "Thấp" };

function genTaskId() { return "t" + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function todayISO() { return new Date().toISOString().slice(0,10); }

function isOverdue(task) {
  if (!task.dueDate || task.status === "done") return false;
  return task.dueDate < todayISO();
}

// ── TaskFormModal: tạo / sửa task ────────────────────────────────────────────
function TaskFormModal({ task, quotes, onSave, onClose }) {
  const isNew = !task;
  const [form, setForm] = React.useState(task ? { ...task } : {
    id: genTaskId(), title: "", description: "", status: "todo",
    priority: "medium", progress: 0, dueDate: todayISO(),
    quoteId: "", createdAt: new Date().toISOString(),
  });
  const set = (f, v) => setForm(p => ({ ...p, [f]: v }));

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ maxWidth: 520, height: "auto", maxHeight: "90vh" }}>
        <div className="modal-header">
          <span className="modal-title">{isNew ? "➕ Thêm công việc" : "✏️ Sửa công việc"}</span>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body" style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div className="form-group">
            <label>Tên công việc *</label>
            <input className="form-control" value={form.title} onChange={e => set("title", e.target.value)} placeholder="VD: Gọi điện cho khách hàng A..." autoFocus />
          </div>
          <div className="form-group">
            <label>Mô tả chi tiết</label>
            <textarea className="form-control" rows={3} value={form.description || ""} onChange={e => set("description", e.target.value)} placeholder="Ghi chú thêm..." />
          </div>
          <div className="form-row form-row-3">
            <div className="form-group">
              <label>Trạng thái</label>
              <select className="form-control" value={form.status} onChange={e => set("status", e.target.value)}>
                {TASK_STATUSES.map(s => <option key={s} value={s}>{TASK_STATUS_LABELS[s]}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label>Độ ưu tiên</label>
              <select className="form-control" value={form.priority} onChange={e => set("priority", e.target.value)}>
                {TASK_PRIORITIES.map(p => <option key={p} value={p}>{TASK_PRIORITY_LABELS[p]}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label>Deadline</label>
              <input className="form-control" type="date" value={form.dueDate || ""} onChange={e => set("dueDate", e.target.value)} />
            </div>
          </div>
          <div className="form-group">
            <label>Tiến độ: <strong>{form.progress}%</strong></label>
            <input type="range" min={0} max={100} step={5} value={form.progress}
              onChange={e => { const v = Number(e.target.value); set("progress", v); if (v === 100) set("status", "done"); else if (v > 0 && form.status === "todo") set("status", "doing"); }}
              style={{ width: "100%", accentColor: "#1a2540" }} />
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#aaa", marginTop: 2 }}>
              <span>0%</span><span>50%</span><span>100%</span>
            </div>
          </div>
          <div className="form-group">
            <label>Liên kết báo giá (tùy chọn)</label>
            <select className="form-control" value={form.quoteId || ""} onChange={e => set("quoteId", e.target.value)}>
              <option value="">— Không liên kết —</option>
              {(quotes || []).map(q => (
                <option key={q.id} value={q.id}>{q.quoteNumber} – {q.customer}</option>
              ))}
            </select>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Hủy</button>
          <button className="btn btn-primary" onClick={() => { if (!form.title.trim()) { alert("Vui lòng nhập tên công việc"); return; } onSave(form); }}>
            💾 Lưu
          </button>
        </div>
      </div>
    </div>
  );
}

// ── TaskCard: card hiển thị trong kanban hoặc list ───────────────────────────
function TaskCard({ task, quotes, onEdit, onDelete, onProgressChange, onStatusChange, draggable, onDragStart, onDragOver, onDrop }) {
  const linkedQuote = task.quoteId ? (quotes || []).find(q => q.id === task.quoteId) : null;
  const overdue = isOverdue(task);

  return (
    <div className="task-card"
      draggable={draggable}
      onDragStart={onDragStart}
      onDragOver={e => { e.preventDefault(); onDragOver && onDragOver(e); }}
      onDrop={onDrop}
    >
      <div style={{ display: "flex", alignItems: "flex-start", gap: 8, marginBottom: 4 }}>
        {/* Priority dot */}
        <span className={`priority-dot priority-${task.priority || "medium"}`} style={{ marginTop: 4 }} />
        <div style={{ flex: 1 }}>
          <div className="task-title" style={{ textDecoration: task.status === "done" ? "line-through" : "none", color: task.status === "done" ? "#aaa" : "#1a2540" }}>
            {task.title}
          </div>
          {task.description && <div style={{ fontSize: 12, color: "#888", marginTop: 2 }}>{task.description}</div>}
        </div>
        <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
          <button onClick={() => onEdit(task)} style={{ background: "none", border: "none", cursor: "pointer", color: "#888", fontSize: 14, padding: "2px 4px" }}>✏️</button>
          <button onClick={() => onDelete(task.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "#dc2626", fontSize: 14, padding: "2px 4px", opacity: 0.5 }}
            onMouseEnter={e => e.currentTarget.style.opacity = "1"}
            onMouseLeave={e => e.currentTarget.style.opacity = "0.5"}
          >🗑️</button>
        </div>
      </div>
      <div className="task-meta">
        {task.dueDate && (
          <span style={{ color: overdue ? "#dc2626" : "#888" }}>
            {overdue ? "⚠️ " : "📅 "}{task.dueDate}
          </span>
        )}
        {task.priority === "high" && <span className="task-tag urgent">🔴 Khẩn</span>}
        {linkedQuote && <span className="task-tag linked">🔗 {linkedQuote.quoteNumber}</span>}
      </div>
      {/* Progress bar */}
      <div style={{ marginTop: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div className="progress-bar" style={{ flex: 1 }}>
            <div className="progress-fill" style={{ width: (task.progress || 0) + "%", background: task.status === "done" ? "#16a34a" : "#1a2540" }} />
          </div>
          <input className="task-progress-input" type="number" min={0} max={100} value={task.progress || 0}
            onChange={e => onProgressChange(task.id, Number(e.target.value))}
            onClick={e => e.stopPropagation()} />
          <span style={{ fontSize: 11, color: "#888" }}>%</span>
        </div>
      </div>
    </div>
  );
}

// ── TasksView: màn hình chính quản lý công việc ───────────────────────────────
function TasksView({ quotes }) {
  const [tasks, setTasks]           = React.useState([]);
  const [loaded, setLoaded]         = React.useState(false);
  const [editTask, setEditTask]     = React.useState(null);
  const [showForm, setShowForm]     = React.useState(false);
  const [filterPri, setFilterPri]   = React.useState("all");
  const [dragId, setDragId]         = React.useState(null);
  const [search, setSearch]         = React.useState("");

  React.useEffect(() => {
    loadTasks().then(t => { setTasks(t || []); setLoaded(true); }).catch(() => setLoaded(true));
  }, []);

  const persist = (newTasks) => { setTasks(newTasks); saveTasks(newTasks); };

  const saveTask = (task) => {
    const idx = tasks.findIndex(t => t.id === task.id);
    const updated = idx >= 0 ? tasks.map(t => t.id === task.id ? task : t) : [task, ...tasks];
    persist(updated);
    setShowForm(false); setEditTask(null);
  };

  const deleteTask = (id) => { if (window.confirm("Xóa công việc này?")) persist(tasks.filter(t => t.id !== id)); };

  const updateProgress = (id, val) => {
    persist(tasks.map(t => t.id === id ? {
      ...t, progress: Math.max(0, Math.min(100, val)),
      status: val >= 100 ? "done" : val > 0 ? "doing" : "todo"
    } : t));
  };

  const updateStatus = (id, status) => {
    persist(tasks.map(t => t.id === id ? {
      ...t, status,
      progress: status === "done" ? 100 : status === "todo" ? 0 : t.progress
    } : t));
  };

  // Drag & drop kanban
  const handleDrop = (targetStatus) => {
    if (!dragId) return;
    updateStatus(dragId, targetStatus);
    setDragId(null);
  };

  const filtered = tasks.filter(t => {
    const matchPri = filterPri === "all" || t.priority === filterPri;
    const matchSearch = !search || t.title.toLowerCase().includes(search.toLowerCase());
    return matchPri && matchSearch;
  });

  const todayTasks = filtered.filter(t => t.dueDate === todayISO() && t.status !== "done");
  const overdueTasks = filtered.filter(t => isOverdue(t));
  const upcomingTasks = filtered.filter(t => t.dueDate > todayISO() && t.status !== "done");
  const doneTasks = filtered.filter(t => t.status === "done");

  // Stats
  const total = tasks.length;
  const doneCount = tasks.filter(t => t.status === "done").length;
  const overdueCount = tasks.filter(t => isOverdue(t)).length;
  const avgProgress = total ? Math.round(tasks.reduce((s, t) => s + (t.progress || 0), 0) / total) : 0;

  if (!loaded) return <div className="empty-state"><div style={{fontSize:32}}>⏳</div><h3>Đang tải công việc...</h3></div>;

  return (
    <div>
      {/* Header */}
      <div style={{ marginBottom: 20, display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
        <div>
          <h2 style={{ fontSize: 18, fontWeight: 600, color: "#1a2540", marginBottom: 4 }}>📋 Công việc hằng ngày</h2>
          <p style={{ color: "#888", fontSize: 13 }}>{total} công việc · {doneCount} hoàn thành · {overdueCount > 0 ? `${overdueCount} quá hạn ⚠️` : "không quá hạn"}</p>
        </div>
        <button className="btn btn-primary" onClick={() => { setEditTask(null); setShowForm(true); }}>+ Thêm công việc</button>
      </div>

      {/* Stats mini */}
      <div className="stats-grid" style={{ gridTemplateColumns: "repeat(4,1fr)", marginBottom: 16 }}>
        {[
          { label: "Tổng", value: total, sub: "công việc" },
          { label: "Hoàn thành", value: doneCount, sub: `${total ? Math.round(doneCount/total*100) : 0}%`, color: "#16a34a" },
          { label: "Quá hạn", value: overdueCount, sub: "cần xử lý", color: overdueCount > 0 ? "#dc2626" : "#888" },
          { label: "Tiến độ TB", value: avgProgress + "%", sub: "toàn bộ", color: "#2563eb" },
        ].map(s => (
          <div className="stat-card" key={s.label}>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value" style={{ color: s.color || "#1a2540", fontSize: 20 }}>{s.value}</div>
            <div className="stat-sub">{s.sub}</div>
          </div>
        ))}
      </div>

      {/* Filter bar */}
      <div className="filter-bar" style={{ marginBottom: 16 }}>
        <input className="search-input" placeholder="🔍 Tìm công việc..." value={search} onChange={e => setSearch(e.target.value)} />
        <select className="form-control" style={{ width: "auto" }} value={filterPri} onChange={e => setFilterPri(e.target.value)}>
          <option value="all">Tất cả ưu tiên</option>
          {TASK_PRIORITIES.map(p => <option key={p} value={p}>{TASK_PRIORITY_LABELS[p]}</option>)}
        </select>
      </div>

      {/* ── LIST: Hôm nay + Quá hạn + Sắp tới ── */}
      {(todayTasks.length > 0 || overdueTasks.length > 0) && (
        <div className="card" style={{ marginBottom: 16 }}>
          {overdueTasks.length > 0 && (
            <>
              <div className="card-header" style={{ background: "#fff5f5" }}>
                <span style={{ fontWeight: 600, color: "#dc2626" }}>⚠️ Quá hạn ({overdueTasks.length})</span>
              </div>
              {overdueTasks.map(t => (
                <div key={t.id} className="task-list-item">
                  <div className={`task-checkbox ${t.status === "done" ? "checked" : ""}`}
                    onClick={() => updateStatus(t.id, t.status === "done" ? "todo" : "done")}>
                    {t.status === "done" && "✓"}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 500, color: "#dc2626", textDecoration: t.status === "done" ? "line-through" : "none" }}>{t.title}</div>
                    <div style={{ fontSize: 11, color: "#dc2626", marginTop: 2 }}>Deadline: {t.dueDate}</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <div className="progress-bar" style={{ width: 80 }}>
                      <div className="progress-fill" style={{ width: (t.progress||0)+"%", background: "#dc2626" }} />
                    </div>
                    <span style={{ fontSize: 11, color: "#888", minWidth: 30 }}>{t.progress||0}%</span>
                    <button onClick={() => { setEditTask(t); setShowForm(true); }} style={{ background: "none", border: "none", cursor: "pointer", color: "#888" }}>✏️</button>
                  </div>
                </div>
              ))}
            </>
          )}
          {todayTasks.length > 0 && (
            <>
              <div className="card-header">
                <span style={{ fontWeight: 600, color: "#1a2540" }}>📅 Hôm nay ({todayTasks.length})</span>
              </div>
              {todayTasks.map(t => (
                <div key={t.id} className="task-list-item">
                  <div className={`task-checkbox ${t.status === "done" ? "checked" : ""}`}
                    onClick={() => updateStatus(t.id, t.status === "done" ? "todo" : "done")}>
                    {t.status === "done" && "✓"}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 500, textDecoration: t.status === "done" ? "line-through" : "none" }}>{t.title}</div>
                    {t.description && <div style={{ fontSize: 11, color: "#888", marginTop: 1 }}>{t.description}</div>}
                    {(() => { const q = t.quoteId && quotes.find(x => x.id === t.quoteId); return q ? <span className="task-tag linked" style={{ marginTop: 2, display: "inline-block" }}>🔗 {q.quoteNumber}</span> : null; })()}
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <input className="task-progress-input" type="number" min={0} max={100} value={t.progress||0}
                      onChange={e => updateProgress(t.id, Number(e.target.value))} />
                    <span style={{ fontSize: 11, color: "#888" }}>%</span>
                    <button onClick={() => { setEditTask(t); setShowForm(true); }} style={{ background: "none", border: "none", cursor: "pointer", color: "#888" }}>✏️</button>
                  </div>
                </div>
              ))}
            </>
          )}
          {upcomingTasks.length > 0 && (
            <>
              <div className="card-header">
                <span style={{ fontWeight: 600, color: "#666" }}>🗓️ Sắp tới ({upcomingTasks.length})</span>
              </div>
              {upcomingTasks.slice(0,5).map(t => (
                <div key={t.id} className="task-list-item">
                  <div className={`task-checkbox ${t.status === "done" ? "checked" : ""}`}
                    onClick={() => updateStatus(t.id, t.status === "done" ? "todo" : "done")}>
                    {t.status === "done" && "✓"}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 500 }}>{t.title}</div>
                    <div style={{ fontSize: 11, color: "#888" }}>📅 {t.dueDate}</div>
                  </div>
                  <button onClick={() => { setEditTask(t); setShowForm(true); }} style={{ background: "none", border: "none", cursor: "pointer", color: "#888" }}>✏️</button>
                </div>
              ))}
            </>
          )}
        </div>
      )}

      {tasks.length === 0 && (
        <div className="empty-state">
          <div style={{ fontSize: 40 }}>📋</div>
          <h3>Chưa có công việc nào</h3>
          <p style={{ fontSize: 13 }}>Bấm "+ Thêm công việc" để bắt đầu</p>
        </div>
      )}

      {/* ── KANBAN ── */}
      {tasks.length > 0 && (
        <div>
          <div className="section-title" style={{ marginTop: 8 }}>🗂️ Bảng Kanban</div>
          <div className="kanban-wrap">
            {TASK_STATUSES.map(status => {
              const col = filtered.filter(t => t.status === status);
              return (
                <div key={status} className="kanban-col"
                  onDragOver={e => e.preventDefault()}
                  onDrop={() => handleDrop(status)}
                  style={{ borderTop: `3px solid ${TASK_STATUS_COLORS[status]}` }}>
                  <div className="kanban-col-header">
                    <span style={{ color: TASK_STATUS_COLORS[status] }}>{TASK_STATUS_LABELS[status]}</span>
                    <span className="kanban-col-count">{col.length}</span>
                  </div>
                  {col.length === 0 && (
                    <div style={{ textAlign: "center", color: "#ccc", fontSize: 12, padding: "20px 0" }}>Thả công việc vào đây</div>
                  )}
                  {col.map(t => (
                    <TaskCard key={t.id} task={t} quotes={quotes}
                      onEdit={t => { setEditTask(t); setShowForm(true); }}
                      onDelete={deleteTask}
                      onProgressChange={updateProgress}
                      onStatusChange={updateStatus}
                      draggable
                      onDragStart={() => setDragId(t.id)}
                    />
                  ))}
                  {/* Nút thêm nhanh trong cột */}
                  <button className="btn btn-ghost btn-sm" style={{ width: "100%", marginTop: 4, justifyContent: "center" }}
                    onClick={() => { setEditTask({ id: genTaskId(), title: "", status, priority: "medium", progress: status === "done" ? 100 : 0, dueDate: todayISO(), createdAt: new Date().toISOString() }); setShowForm(true); }}>
                    + Thêm
                  </button>
                </div>
              );
            })}
          </div>

          {/* Done section collapsed */}
          {doneTasks.length > 0 && (
            <details style={{ marginTop: 16 }}>
              <summary style={{ cursor: "pointer", fontSize: 13, color: "#888", padding: "8px 0", userSelect: "none" }}>
                ✅ Đã hoàn thành ({doneTasks.length}) — click để xem
              </summary>
              <div className="card" style={{ marginTop: 8 }}>
                {doneTasks.map(t => (
                  <div key={t.id} className="task-list-item">
                    <div className="task-checkbox checked" onClick={() => updateStatus(t.id, "todo")}>✓</div>
                    <div style={{ flex: 1, color: "#aaa", textDecoration: "line-through", fontSize: 13 }}>{t.title}</div>
                    <button onClick={() => deleteTask(t.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "#ddd", fontSize: 13 }}>🗑️</button>
                  </div>
                ))}
              </div>
            </details>
          )}
        </div>
      )}

      {showForm && (
        <TaskFormModal
          task={editTask}
          quotes={quotes}
          onSave={saveTask}
          onClose={() => { setShowForm(false); setEditTask(null); }}
        />
      )}
    </div>
  );
}

// ─── XmlImportModal: đọc XML hóa đơn điện tử → lấy tên hàng + ĐVT ──────────
function XmlImportModal({ onImport, onClose }) {
  const [items, setItems]       = React.useState([]);
  const [selected, setSelected] = React.useState(new Set());
  const [error, setError]       = React.useState("");
  const [fileName, setFileName] = React.useState("");
  const fileRef = React.useRef(null);

  const parseXml = (text) => {
    try {
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, "application/xml");
      const parseErr = doc.querySelector("parsererror");
      if (parseErr) throw new Error("File XML không hợp lệ");

      // Đọc tất cả <HHDVu> (dòng hàng hóa/dịch vụ)
      const nodes = doc.querySelectorAll("HHDVu");
      if (nodes.length === 0) throw new Error("Không tìm thấy dòng hàng hóa trong file XML");

      const result = [];
      nodes.forEach((node, i) => {
        const name = node.querySelector("THHDVu")?.textContent?.trim() || "";
        const unit = node.querySelector("DVTinh")?.textContent?.trim() || "Cái";
        if (name) result.push({ id: i, name, unit });
      });

      if (result.length === 0) throw new Error("Không đọc được tên hàng hóa từ file XML");
      setItems(result);
      // Chọn tất cả mặc định
      setSelected(new Set(result.map(it => it.id)));
      setError("");
    } catch(e) {
      setError(e.message);
      setItems([]);
    }
  };

  const handleFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setFileName(file.name);
    const reader = new FileReader();
    reader.onload = (ev) => parseXml(ev.target.result);
    reader.readAsText(file, "utf-8");
  };

  const toggleAll = (checked) => {
    setSelected(checked ? new Set(items.map(it => it.id)) : new Set());
  };

  const toggleOne = (id) => {
    setSelected(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  };

  const handleImport = () => {
    const chosen = items.filter(it => selected.has(it.id));
    if (chosen.length === 0) { alert("Chưa chọn mặt hàng nào"); return; }
    onImport(chosen);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ maxWidth:560, height:"auto", maxHeight:"90vh" }}>
        <div className="modal-header">
          <span className="modal-title">📄 Nhập hàng hóa từ XML hóa đơn điện tử</span>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">

          {/* Upload zone */}
          <div style={{ border:"2px dashed #d1cfc6", borderRadius:8, padding:"20px", textAlign:"center", marginBottom:16, cursor:"pointer", background:"#fafaf7" }}
            onClick={() => fileRef.current && fileRef.current.click()}
            onDragOver={e => e.preventDefault()}
            onDrop={e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f) { setFileName(f.name); const r = new FileReader(); r.onload = ev => parseXml(ev.target.result); r.readAsText(f,"utf-8"); } }}>
            <div style={{ fontSize:28, marginBottom:6 }}>📂</div>
            <div style={{ fontSize:13, color:"#555" }}>{fileName || "Click hoặc kéo thả file XML hóa đơn vào đây"}</div>
            <div style={{ fontSize:11, color:"#aaa", marginTop:4 }}>Hỗ trợ file XML hóa đơn điện tử chuẩn Việt Nam</div>
            <input ref={fileRef} type="file" accept=".xml,text/xml,application/xml" style={{ display:"none" }} onChange={handleFile} />
          </div>

          {error && (
            <div style={{ background:"#fee2e2", color:"#dc2626", padding:"10px 14px", borderRadius:6, fontSize:13, marginBottom:12 }}>
              ❌ {error}
            </div>
          )}

          {items.length > 0 && (
            <>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
                <div style={{ fontSize:13, fontWeight:600, color:"#1a2540" }}>
                  Tìm thấy {items.length} mặt hàng — chọn để thêm vào báo giá:
                </div>
                <label style={{ fontSize:12, color:"#666", cursor:"pointer", display:"flex", alignItems:"center", gap:5 }}>
                  <input type="checkbox"
                    checked={selected.size === items.length}
                    onChange={e => toggleAll(e.target.checked)} />
                  Chọn tất cả
                </label>
              </div>
              <div className="card" style={{ maxHeight:320, overflowY:"auto" }}>
                {items.map(it => (
                  <div key={it.id} className="xml-result-item" onClick={() => toggleOne(it.id)} style={{ cursor:"pointer" }}>
                    <input type="checkbox" checked={selected.has(it.id)} onChange={() => toggleOne(it.id)}
                      onClick={e => e.stopPropagation()} />
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:500 }}>{it.name}</div>
                      <div style={{ fontSize:11, color:"#888" }}>ĐVT: {it.unit}</div>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{ fontSize:12, color:"#888", marginTop:8, textAlign:"right" }}>
                Đã chọn: <strong>{selected.size}</strong> / {items.length}
              </div>
            </>
          )}
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Hủy</button>
          {items.length > 0 && (
            <button className="btn btn-primary" onClick={handleImport} disabled={selected.size === 0}>
              ✅ Thêm {selected.size} mặt hàng vào báo giá
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

  const [filterStatus, setFilterStatus] = useState("all");
  const [deleteConfirm, setDeleteConfirm] = useState(null);

  // Lắng nghe GAS Unauthorized event → chuyển về màn đăng nhập ngay
  useEffect(() => {
    const handler = () => setAuthed(false);
    window.addEventListener("gas_unauthorized", handler);
    return () => window.removeEventListener("gas_unauthorized", handler);
  }, []);

  // ── Khởi động: load từ GAS (hoặc cache nếu offline) ──────────────────────
  useEffect(() => {
    if (!authed) return; // chưa đăng nhập → không load
    (async () => {
      try {
        await migrateFromLocalStorage();
        const data = await doLoad();
        setQuotes(data ?? []);
        if (_mem.products.length === 0 && data && data.length) {
          await upsertCatalogItems(data.flatMap(q => q.items || []));
        }
      } catch(e) {
        console.error("Load error:", e);
        setQuotes([]);
      } finally {
        setLoaded(true);
      }
    })();
  }, [authed]);

  // ── Tự động lưu mỗi khi quotes thay đổi (debounce) ───────────────────────
  useEffect(() => {
    if (!loaded) return;
    saveQuotes(quotes);
  }, [quotes, loaded]);

  const saveQuote = (q) => {
    setQuotes(prev => {
      const idx = prev.findIndex(x=>x.id===q.id);
      if (idx>=0) { const n=[...prev]; n[idx]=q; return n; }
      return [q,...prev];
    });
    setShowModal(false);
    setEditQuote(null);
  };

  const deleteQuote = (id) => {
    setQuotes(prev=>prev.filter(q=>q.id!==id));
    setDeleteConfirm(null);
  };

  // Filter list: search by quote number, customer, OR item name
  const filtered = quotes.filter(q => {
    const matchStatus = filterStatus==="all" || q.status===filterStatus;
    if (!matchStatus) return false;
    if (!search && !itemSearch) return true;
    const s = search.toLowerCase();
    const iS = itemSearch.toLowerCase();
    const matchMain = !s || q.quoteNumber.toLowerCase().includes(s) || q.customer.toLowerCase().includes(s);
    const matchItem = !iS || q.items.some(it => it.name.toLowerCase().includes(iS) || (it.note||"").toLowerCase().includes(iS));
    return matchMain && matchItem;
  }).slice().sort((a, b) => {
    const hasA = !!(a.quoteNumber && a.quoteNumber.trim());
    const hasB = !!(b.quoteNumber && b.quoteNumber.trim());
    // No-number quotes go to bottom
    if (hasA && !hasB) return -1;
    if (!hasA && hasB) return 1;
    if (!hasA && !hasB) return 0;
    // Both have numbers — sort newest first by extracting date digits from quoteNumber (DDMMYY format)
    // Format: BG{DD}{MM}{YY}{counter} e.g. BG13062603 → 13/06/2026
    const extractDate = (qn) => {
      const m = qn.replace(/^[A-Za-z]+/, "");
      if (m.length >= 6) {
        const day = m.slice(0,2), mon = m.slice(2,4), yr = m.slice(4,6);
        return `20${yr}${mon}${day}`;
      }
      return qn;
    };
    const da = extractDate(a.quoteNumber);
    const db2 = extractDate(b.quoteNumber);
    if (da !== db2) return db2.localeCompare(da); // newest first
    // Same date — sort by counter descending
    return b.quoteNumber.localeCompare(a.quoteNumber);
  });

  const stats = {
    total: quotes.length,
    draft: quotes.filter(q=>q.status==="draft").length,
    sent: quotes.filter(q=>q.status==="sent").length,
    accepted: quotes.filter(q=>q.status==="accepted").length,
    totalValue: quotes.reduce((s,q)=>s+calcItems(q.items,q.vatRate).total,0),
    acceptedValue: quotes.filter(q=>q.status==="accepted").reduce((s,q)=>s+calcItems(q.items,q.vatRate).total,0),
  };

  // ── Guard: chưa đăng nhập → hiện LoginScreen ─────────────────────────────
  if (!gasReady) {
    return <SetupScreen onDone={() => setGasReady(true)} />;
  }

  if (!authed) {
    return <LoginScreen onLogin={() => setAuthed(true)} />;
  }

  // ── Guard: đang load dữ liệu ─────────────────────────────────────────────
  if (!loaded) {
    return (
      <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#f5f3ee", flexDirection:"column", gap:12 }}>
        <img src={getLogoUrl()} style={{ width:48, opacity:0.5 }} alt="PMC" />
        <div style={{ color:"#888", fontSize:13 }}>Đang tải dữ liệu...</div>
      </div>
    );
  }

  return (
    <div className="app">
      <div className="topbar no-print">
        <div className="topbar-brand">
          <img src={getLogoUrl()} alt="PMC" />
          <span>Quản Lý Báo Giá – {COMPANY.short}</span>
        </div>
        <div className="topbar-actions">
          <button
            className="btn btn-ghost"
            title="Xuất toàn bộ dữ liệu ra file .json để backup hoặc chuyển máy"
            style={{color:"#fff",border:"1px solid rgba(255,255,255,0.3)",fontSize:12}}
            className="btn-export" onClick={() => exportToJSON()}
          >
            📤 Xuất JSON
          </button>
          <button
            className="btn btn-ghost"
            title="Nhập dữ liệu từ file .json (ghi đè dữ liệu hiện tại)"
            style={{color:"#adc",border:"1px solid rgba(255,255,255,0.2)",fontSize:12}}
            className="btn-import" onClick={() => importFromJSON((newQuotes) => setQuotes(newQuotes))}
          >
            📂 Nhập JSON
          </button>
          <button
            className="btn btn-ghost"
            title="Đăng xuất"
            style={{color:"#f99",border:"1px solid rgba(255,255,255,0.2)",fontSize:12}}
            onClick={logout}
          >
            🔒 Đăng xuất
          </button>
          <button className="btn btn-primary topbar-create" onClick={()=>{setEditQuote(null);setShowModal(true);}}>
            + Tạo báo giá
          </button>
        </div>
      </div>

      <div className="main">
        <div className="sidebar no-print">
          <div className="sidebar-section">Menu</div>
          <div className={`sidebar-item ${view==="dashboard"?"active":""}`} onClick={()=>setView("dashboard")}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <span className="sidebar-label">Dashboard</span>
          </div>
          <div className={`sidebar-item ${view==="list"?"active":""}`} onClick={()=>setView("list")}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/></svg>
            <span className="sidebar-label">Báo giá</span>
            <span className="sidebar-badge">{quotes.length}</span>
          </div>
          <div className={`sidebar-item ${view==="handover"?"active":""}`} onClick={()=>setView("handover")}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 12l2 2 4-4"/><path d="M21 12c0 4.97-4.03 9-9 9S3 16.97 3 12 7.03 3 12 3s9 4.03 9 9z"/></svg>
            <span className="sidebar-label">Biên bản</span>
          </div>
          <div className={`sidebar-item ${view==="contracts"?"active":""}`} onClick={()=>setView("contracts")}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <span className="sidebar-label">Hợp đồng</span>
            <span className="sidebar-badge">{Object.keys(_mem.contracts||{}).length}</span>
          </div>
          <div className={`sidebar-item ${showDebtRecon?"active":""}`} onClick={()=>setShowDebtRecon(true)}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 7H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-3"/><path d="M9 7V4a2 2 0 0 1 2-2h5l4 4v5a2 2 0 0 1-2 2h-3"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
            <span className="sidebar-label">Đối chiếu CN</span>
          </div>
          <div className={`sidebar-item ${view==="tasks"?"active":""}`} onClick={()=>setView("tasks")}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01"/></svg>
            <span className="sidebar-label">Công việc</span>
          </div>
          <div className={`sidebar-item ${view==="notes"?"active":""}`} onClick={()=>setView("notes")}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            <span className="sidebar-label">Ghi chú</span>
          </div>

          <div className={`sidebar-item ${view==="settings"?"active":""}`} onClick={()=>setView("settings")}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span className="sidebar-label">Cài đặt</span>
          </div>

          <div className="sidebar-section">Trạng thái</div>
          {Object.entries(STATUS_LABELS).map(([k,v])=>(
            <div key={k} className={`sidebar-item ${filterStatus===k&&view==="list"?"active":""}`}
              onClick={()=>{setFilterStatus(k);setView("list");}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:{draft:"#9ca3af",sent:"#3b82f6",accepted:"#22c55e",rejected:"#ef4444"}[k],display:"inline-block"}}/>
              {v}
              <span style={{marginLeft:"auto",fontSize:11,color:"#aaa"}}>{quotes.filter(q=>q.status===k).length}</span>
            </div>
          ))}
          <div className={`sidebar-item ${filterStatus==="all"&&view==="list"?"active":""}`}
            onClick={()=>{setFilterStatus("all");setView("list");}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/></svg>
            Tất cả
          </div>
        </div>

        <div className="content">
          {view === "dashboard" && (
            <div>
              <div style={{marginBottom:20}}>
                <h2 style={{fontSize:18,fontWeight:600,color:"#1a2540",marginBottom:4}}>Dashboard</h2>
                <p style={{color:"#888",fontSize:13}}>Tổng quan hoạt động báo giá</p>
              </div>
              <div className="stats-grid">
                <div className="stat-card">
                  <div className="stat-label">Tổng báo giá</div>
                  <div className="stat-value">{stats.total}</div>
                  <div className="stat-sub">Tất cả trạng thái</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Chờ phản hồi</div>
                  <div className="stat-value" style={{color:"#2563eb"}}>{stats.sent}</div>
                  <div className="stat-sub">Đã gửi khách</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Chấp nhận</div>
                  <div className="stat-value" style={{color:"#16a34a"}}>{stats.accepted}</div>
                  <div className="stat-sub">Đơn thành công</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Doanh số chấp nhận</div>
                  <div className="stat-value" style={{fontSize:16}}>{fmt(stats.acceptedValue)}đ</div>
                  <div className="stat-sub">Có VAT</div>
                </div>
              </div>
              <div className="card">
                <div className="card-header">
                  <span style={{fontWeight:500}}>Báo giá gần đây</span>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setView("list")}>Xem tất cả →</button>
                </div>
                <div className="table-wrap">
                  <table>
                    <thead><tr><th>Số BG</th><th>Khách hàng</th><th>Ngày</th><th>Tổng tiền</th><th>Trạng thái</th></tr></thead>
                    <tbody>
                      {quotes.slice(0,5).map(q=>{
                        const {total}=calcItems(q.items,q.vatRate);
                        return (
                          <tr key={q.id} style={{cursor:"pointer"}} onClick={()=>{setEditQuote(q);setShowModal(true);}}>
                            <td style={{fontWeight:500,color:"#1a2540"}}>{q.quoteNumber}</td>
                            <td>
                              {(() => {
                                const col = getCustomerColor(q.customer);
                                return (
                                  <span style={{background:col.bg,color:col.text,borderRadius:5,padding:"3px 9px",fontSize:13,fontWeight:600}}>
                                    {q.customer}
                                  </span>
                                );
                              })()}
                            </td>
                            <td style={{color:"#888"}}>{q.date}</td>
                            <td style={{fontWeight:500}}>{fmt(total)} đ</td>
                            <td><span className={`badge badge-${q.status}`}>{STATUS_LABELS[q.status]}</span></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {view === "tasks" && (
            <TasksView quotes={quotes} />
          )}

          {view === "settings" && (
            <SettingsView onCompanyUpdate={(co) => { Object.assign(COMPANY, co); }} />
          )}

          {view === "notes" && (
            <NotesView />
          )}

          {view === "contracts" && (
            <ContractsView quotes={quotes} onOpenContract={(q) => setContractQuote(q)} />
          )}

          {view === "handover" && (
            <div>
              <div style={{marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <h2 style={{fontSize:18,fontWeight:600,color:"#1a2540",marginBottom:4}}>Biên bản bàn giao & nghiệm thu</h2>
                  <p style={{color:"#888",fontSize:13}}>Tạo biên bản từ báo giá đã có hoặc tạo mới độc lập</p>
                </div>
                <button className="btn btn-primary" onClick={()=>setShowNewHandover(true)}>+ Tạo biên bản mới</button>
              </div>
              <div className="card">
                <div style={{padding:"16px 20px",borderBottom:"1px solid #e5e3dc"}}>
                  <div style={{fontSize:13,color:"#555",fontWeight:500}}>Tạo biên bản từ báo giá có sẵn</div>
                  <div style={{fontSize:12,color:"#aaa",marginTop:3}}>Chọn một báo giá bên dưới để tạo biên bản bàn giao & nghiệm thu từ danh sách hàng hóa đã có</div>
                </div>
                <div className="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>Số BG</th>
                        <th>Khách hàng</th>
                        <th>Ngày</th>
                        <th style={{textAlign:"center"}}>Hàng hóa</th>
                        <th style={{textAlign:"right"}}>Tổng tiền</th>
                        <th style={{textAlign:"center"}}>Thao tác</th>
                      </tr>
                    </thead>
                    <tbody>
                      {quotes.map(q=>{
                        const {total}=calcItems(q.items,q.vatRate);
                        return (
                          <tr key={q.id}>
                            <td style={{fontWeight:500,color:"#1a2540"}}>{q.quoteNumber}</td>
                            <td>{q.customer}</td>
                            <td style={{color:"#888",whiteSpace:"nowrap"}}>{q.date}</td>
                            <td style={{textAlign:"center",color:"#888"}}>{q.items.length} dòng</td>
                            <td style={{textAlign:"right",fontWeight:500}}>{fmt(total)} đ</td>
                            <td>
                              <div style={{display:"flex",gap:4,justifyContent:"center"}}>
                                <button className="btn btn-primary btn-sm" onClick={()=>setHandoverQuote(q)}>
                                  📋 Tạo biên bản
                                </button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {view === "list" && (            <div>
              <div style={{marginBottom:20}}>
                <h2 style={{fontSize:18,fontWeight:600,color:"#1a2540",marginBottom:4}}>Danh sách báo giá</h2>
                <p style={{color:"#888",fontSize:13}}>{filtered.length} báo giá {filterStatus!=="all"?`– ${STATUS_LABELS[filterStatus]}`:""}</p>
              </div>
              <div className="filter-bar">
                <input className="search-input" placeholder="🔍 Tìm số BG hoặc khách hàng..." value={search} onChange={e=>setSearch(e.target.value)} />
                <input className="search-input" style={{width:240}} placeholder="📦 Tìm tên hàng hóa..." value={itemSearch} onChange={e=>setItemSearch(e.target.value)} />
                <select className="form-control" style={{width:"auto"}} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
                  <option value="all">Tất cả trạng thái</option>
                  {Object.entries(STATUS_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                </select>
                <button className="btn btn-primary" onClick={()=>{setEditQuote(null);setShowModal(true);}}>+ Tạo báo giá</button>
              </div>
              <div className="card">
                {filtered.length===0?(
                  <div className="empty-state">
                    <div style={{fontSize:40}}>📄</div>
                    <h3>Không tìm thấy báo giá</h3>
                    <p style={{fontSize:13}}>{search||itemSearch ? "Thử thay đổi từ khóa tìm kiếm" : "Tạo báo giá mới để bắt đầu"}</p>
                    {!search&&!itemSearch&&<button className="btn btn-primary" style={{marginTop:12}} onClick={()=>{setEditQuote(null);setShowModal(true);}}>+ Tạo báo giá đầu tiên</button>}
                  </div>
                ):(
                  <div className="table-wrap">
                    <table>
                      <thead>
                        <tr>
                          <th>Số BG</th>
                          <th>Khách hàng</th>
                          <th>Ngày</th>
                          <th>Hàng hóa</th>
                          <th style={{textAlign:"right"}}>Tổng tiền</th>
                          <th>Trạng thái</th>
                          <th style={{textAlign:"center"}}>Thao tác</th>
                        </tr>
                      </thead>
                      <tbody>
                        {filtered.map(q=>{
                          const {total}=calcItems(q.items,q.vatRate);
                          // Highlight matched items if searching
                          const matchedItems = itemSearch ? q.items.filter(it => it.name.toLowerCase().includes(itemSearch.toLowerCase())) : [];
                          return (
                            <tr key={q.id}>
                              <td style={{fontWeight:500,color:"#1a2540"}}>
                                {q.quoteNumber}
                                {q.internalNote && <span title={q.internalNote} style={{marginLeft:5,fontSize:11,cursor:"help"}}>🔒</span>}
                              </td>
                              <td>
                                {(() => {
                                  const col = getCustomerColor(q.customer);
                                  return (
                                    <div>
                                      <div style={{
                                        display:"inline-block",
                                        background:col.bg, color:col.text,
                                        borderRadius:5, padding:"3px 9px",
                                        fontSize:13, fontWeight:600,
                                        marginBottom: q.contact||matchedItems.length>0 ? 3 : 0,

                                      {q.contact&&<div style={{fontSize:11,color:"#aaa"}}>{q.contact}</div>}

                                        <div style={{fontSize:10,color:"#1a2540",background:"#eef0f8",padding:"2px 5px",borderRadius:3,marginTop:3,display:"inline-block"}}>

      )}
    </div>
  );

// ─── XML Parser helpers ───────────────────────────────────────────────────────
// Đọc hóa đơn điện tử Việt Nam: thử nhiều tag name khác nhau (VNPT, MISA, FAST...)
function parseInvoiceXml(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, "application/xml");
  if (doc.querySelector("parsererror")) throw new Error("File XML không hợp lệ");
 
  // ── Thông tin hóa đơn ──────────────────────────────────────────────────────
  const get = (...tags) => {
    for (const t of tags) {
      const el = doc.querySelector(t);
      if (el && el.textContent.trim()) return el.textContent.trim();
    }
    return "";
  };
 
  const invoiceNumber = get("SHDon","so","invoiceNumber","SoHD","KHMSo","KHSo");
  const serial        = get("KHHDon","KHieu","serial","KyHieu","KHMHDon");
  const invoiceDate   = get("NLap","ngayLap","invoiceDate","NgayHD","TDLap");
  const sellerName    = get("NMSThue","tenNguoiBan","sellerName","TenNBan","NBan > Ten","Ten");
  const sellerTax     = get("MSThue","maSoThueNguoiBan","sellerTaxCode","MSTNBan","NBan > MST","MST");
  const sellerAddr    = get("DChi","diaChiNguoiBan","sellerAddress","DCNBan","NBan > DChi");
  const buyerName     = get("TNMHang","tenNguoiMua","buyerName","TenNMua","NMua > Ten","TenKH");
  const buyerTax      = get("MSTNMHang","maSoThueNguoiMua","buyerTaxCode","MSTNMua","NMua > MST","MSTKH");
  const buyerAddr     = get("DCNMHang","diaChiNguoiMua","buyerAddress","DCNMua","NMua > DChi","DCKH");
 
  // ── Dòng hàng hóa ──────────────────────────────────────────────────────────
  const itemNodes = doc.querySelectorAll("HHDVu,HHDVu,ChiTiet,Item,InvoiceItem,HangHoa");
  const items = [];
  itemNodes.forEach(node => {
    const gname  = node.querySelector("THHDVu,TenHH,tenHangHoa,itemName,TenHangHoa,Ten")?.textContent?.trim() || "";
    const unit   = node.querySelector("DVTinh,DonViTinh,donViTinh,unit,DVT")?.textContent?.trim() || "";
    const qty    = parseFloat(node.querySelector("SLuong,soLuong,quantity,SoLuong,SL")?.textContent?.trim() || "0") || 0;
    const price  = parseFloat((node.querySelector("DGia,donGia,unitPrice,DonGia,Gia")?.textContent?.trim() || "0").replace(/,/g,"")) || 0;
    const vatRateRaw = node.querySelector("TSuat,thueVAT,vatRate,ThueVAT,TS,TSuatVAT")?.textContent?.trim() || "";
    const vatAmt = parseFloat((node.querySelector("TThue,tienThueVAT,vatAmount,TienThue,ThueGTGT")?.textContent?.trim() || "0").replace(/,/g,"")) || 0;
    const lineTotal = parseFloat((node.querySelector("ThTien,tienHangHoa,lineAmount,ThanhTien,TienHang")?.textContent?.trim() || "0").replace(/,/g,"")) || 0;
 
    if (!gname) return;
 
    // Phân tích thuế suất: "10%", "10", "KCT", "KK", "0%"
    let vatRate = 10;
    const vr = vatRateRaw.replace("%","").trim().toUpperCase();
    if (vr === "KCT" || vr === "KK" || vr === "KCTUE" || vr === "") vatRate = -1;
    else { const n = parseFloat(vr); if (!isNaN(n)) vatRate = n; }
 
    const computedLine = lineTotal || (qty * price);
    const computedVat  = vatAmt || (vatRate > 0 ? Math.round(computedLine * vatRate / 100) : 0);
 
    items.push({ name: gname, unit, qty, price, vatRate, vatAmt: computedVat, lineTotal: computedLine });
  });
 
  // ── Tổng hợp ───────────────────────────────────────────────────────────────
  const subtotalRaw = get("TTCThue","tienHangTruocThue","totalBeforeTax","TongTienHang","TTHang");
  const vatTotalRaw = get("TgTThue","tienThueGTGT","totalVat","TongTienThue","TThueGTGT");
  const grandRaw    = get("TgTTTBSo","tongTienThanhToan","grandTotal","TongTienThanhToan","TTToan");
 
  const subtotal = parseFloat(subtotalRaw.replace(/,/g,"")) || items.reduce((s,it)=>s+it.lineTotal,0);
  const vatTotal = parseFloat(vatTotalRaw.replace(/,/g,"")) || items.reduce((s,it)=>s+it.vatAmt,0);
  const grand    = parseFloat(grandRaw.replace(/,/g,"")) || subtotal + vatTotal;
 
  return {
    invoiceNumber, serial, invoiceDate,
    sellerName, sellerTax, sellerAddr,
    buyerName, buyerTax, buyerAddr,
    items, subtotal, vatTotal, grand,
  };
}

  const handleFiles = (files) => {

    const readers = [...files].filter(f => f.name.toLowerCase().endsWith(".xml")).map(file =>
      new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const inv = parseInvoiceXml(ev.target.result);
            inv._id = Date.now().toString(36) + Math.random().toString(36).slice(2,5);
            inv._fileName = file.name;
            resolve({ ok: true, inv });
          } catch(e) {
            resolve({ ok: false, name: file.name, err: e.message });
          }
        };
        reader.readAsText(file, "utf-8");
      })
    );
 
    Promise.all(readers).then(results => {
      const good = results.filter(r => r.ok).map(r => r.inv);
      const bad  = results.filter(r => !r.ok);
 
      if (good.length > 0) {
        setInvoices(prev => {
          // De-duplicate by invoiceNumber + serial
          const existing = new Set(prev.map(i => i.serial + "_" + i.invoiceNumber));
          const newOnes  = good.filter(i => !existing.has(i.serial + "_" + i.invoiceNumber));
          const merged   = [...prev, ...newOnes];
          // Auto-fill buyer info from first invoice with data
          const firstWithBuyer = merged.find(i => i.buyerName);
          if (firstWithBuyer && !buyerName) {
            setBuyerName(firstWithBuyer.buyerName);
            setBuyerTax(firstWithBuyer.buyerTax);
            setBuyerAddr(firstWithBuyer.buyerAddr);
          }
          return merged;
        });
        setExpandedInv(prev => {
          const next = new Set(prev);
          good.forEach(i => next.add(i._id));
          return next;
        });
      }
      if (bad.length > 0) {
        setXmlError(`⚠️ ${bad.length} file lỗi: ${bad.map(b => b.name).join(", ")}`);

    });
  };

  const handlePDF = async () => {
    const el = document.getElementById("debtPreviewContent");
    if (!el) return;
    const SCALE = 3, A4_PX = 794, PAD = 32;
    const save = { width: el.style.width, maxWidth: el.style.maxWidth, padding: el.style.padding, margin: el.style.margin, bg: el.style.background };
    el.style.width = A4_PX + "px"; el.style.maxWidth = A4_PX + "px";
    el.style.padding = PAD + "px"; el.style.margin = "0"; el.style.background = "#ffffff";
 
    const noCutRanges = [];
    el.querySelectorAll("p, h1, h2, h3, h4, h5, h6, table, tr, ul, ol, blockquote, section, header, footer").forEach(elm => {
      const r = elm.getBoundingClientRect(), p = el.getBoundingClientRect();
      noCutRanges.push({ top: r.top - p.top, bottom: r.bottom - p.top });
    });
 
    try {
      const canvas = await window.html2canvas(el, { scale: SCALE, useCORS: true, allowTaint: true, backgroundColor: "#ffffff", logging: false, width: A4_PX, height: el.scrollHeight, windowWidth: A4_PX, imageTimeout: 0 });
      const { jsPDF } = window.jspdf;
      const MARGIN = 10, printW = 210 - MARGIN*2, printH = 297 - MARGIN*2;
      const realW = canvas.width/SCALE, realH = canvas.height/SCALE;
      const mmPerPx = printW/realW, pxPerPage = printH/mmPerPx;
      const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
      let srcY = 0, page = 0;
      while (srcY < realH) {
        if (page > 0) doc.addPage();
        let slicePx = Math.min(pxPerPage, realH - srcY);
        if (srcY + slicePx < realH) {
          for (const rng of noCutRanges) {
            if ((srcY+slicePx) > rng.top+0.5 && (srcY+slicePx) < rng.bottom-0.5) {
              const adj = rng.top - srcY; if (adj > 0) slicePx = adj; break;
            }
          }
        }
        const sliceMm = slicePx * mmPerPx;
        const slice = document.createElement("canvas");
        slice.width = canvas.width; slice.height = Math.ceil(slicePx*SCALE);
        const ctx = slice.getContext("2d");
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, slice.width, slice.height);
        ctx.drawImage(canvas, 0, Math.floor(srcY*SCALE), canvas.width, Math.ceil(slicePx*SCALE), 0, 0, slice.width, slice.height);
        doc.addImage(slice.toDataURL("image/jpeg", 0.92), "JPEG", MARGIN, MARGIN, printW, sliceMm);
        srcY += slicePx; page++;

    }
